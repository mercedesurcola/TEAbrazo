<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAbrazo — ¿Quién juega hoy?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0F7FF; font-family: 'Nunito Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 20px 60px; position: relative; overflow-x: hidden; }
  .burbuja { position: fixed; border-radius: 50%; opacity: 0.12; animation: flotar 6s ease-in-out infinite; z-index: 0; }
  .b1 { width: 200px; height: 200px; background: #5BBFEA; top: -50px; left: -50px; }
  .b2 { width: 150px; height: 150px; background: #FFCC3B; top: 10%; right: -30px; animation-delay: 1s; }
  .b3 { width: 100px; height: 100px; background: #52D9A0; bottom: 15%; left: 10px; animation-delay: 2s; }
  .b4 { width: 120px; height: 120px; background: #A78BFA; bottom: -30px; right: 20%; animation-delay: 0.5s; }
  @keyframes flotar { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

  .contenedor { z-index: 10; width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; gap: 24px; }

  .header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .logo-img { height: 48px; animation: flotar 3s ease-in-out infinite; filter: drop-shadow(0 4px 12px #5BBFEA33); }
  .btn-salir { background: white; border: 2px solid #FF7E6B; border-radius: 14px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: #FF7E6B; cursor: pointer; }
  .btn-salir:active { background: #FFF0EE; }

  .titulo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; color: #333; text-align: center; }

  .grid-perfiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; }

  .tarjeta-perfil { background: white; border-radius: 24px; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 4px 20px #5BBFEA15; cursor: pointer; border: 3px solid transparent; animation: aparecer 0.4s ease forwards; opacity: 0; transform: translateY(20px); position: relative; }
  @keyframes aparecer { to { opacity: 1; transform: translateY(0); } }
  .tarjeta-perfil:active { transform: scale(0.96); border-color: #5BBFEA; }

  .btn-editar-nivel { position: absolute; top: 10px; right: 10px; background: #F0F7FF; border: none; border-radius: 10px; padding: 4px 8px; font-size: 14px; cursor: pointer; color: #5BBFEA; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .btn-editar-nivel:active { background: #E0EFFF; }

  .avatar-circulo { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; animation: pulsar 3s ease-in-out infinite; }
  @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .perfil-nombre { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 17px; color: #333; text-align: center; }
  .perfil-nivel { display: flex; align-items: center; gap: 4px; background: #F0F7FF; border-radius: 50px; padding: 4px 10px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; color: #555; }
  .perfil-xp { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: #FFCC3B; }

  .tarjeta-agregar { background: white; border-radius: 24px; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 4px 20px #5BBFEA15; cursor: pointer; border: 3px dashed #C5E8F7; transition: all 0.2s; }
  .tarjeta-agregar:active { border-color: #5BBFEA; background: #F0F7FF; }
  .agregar-icono { width: 72px; height: 72px; border-radius: 50%; background: #F0F7FF; display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .agregar-texto { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: #5BBFEA; text-align: center; }

  .vacio { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 20px; text-align: center; }
  .vacio-emoji { font-size: 60px; }
  .vacio-texto { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px; color: #555; }

  .cargando { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #E0EFFF; border-top-color: #5BBFEA; border-radius: 50%; animation: girar 0.8s linear infinite; }
  @keyframes girar { to { transform: rotate(360deg); } }
  .cargando-texto { font-family: 'Nunito', sans-serif; font-weight: 700; color: #5BBFEA; font-size: 16px; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #00000055; z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal { background: white; border-radius: 28px 28px 0 0; padding: 32px 24px 48px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 18px; animation: subir 0.3s ease; }
  @keyframes subir { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-titulo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; color: #333; text-align: center; }

  .campo { display: flex; flex-direction: column; gap: 8px; }
  .campo label { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px; color: #555; }
  .campo input { background: #F0F7FF; border: 2px solid #E0EFFF; border-radius: 16px; padding: 16px 18px; font-family: 'Nunito Sans', sans-serif; font-size: 16px; color: #333; outline: none; transition: border-color 0.2s; width: 100%; }
  .campo input:focus { border-color: #5BBFEA; }

  .avatares { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .avatar-opcion { width: 48px; height: 48px; border-radius: 50%; background: #F0F7FF; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transition: all 0.15s; }
  .avatar-opcion.seleccionado { border-color: #5BBFEA; background: #E0F4FF; transform: scale(1.15); }

  /* Selector de nivel */
  .niveles-selector { display: flex; gap: 10px; justify-content: center; }
  .nivel-opcion {
    flex: 1; background: #F0F7FF; border: 3px solid transparent; border-radius: 18px;
    padding: 14px 8px; display: flex; flex-direction: column; align-items: center;
    gap: 6px; cursor: pointer; transition: all 0.2s;
  }
  .nivel-opcion.seleccionado { border-color: #5BBFEA; background: #E0F4FF; }
  .nivel-opcion:active { transform: scale(0.97); }
  .nivel-opcion-animal { font-size: 32px; }
  .nivel-opcion-nombre { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; color: #444; text-align: center; }
  .nivel-opcion-desc { font-family: 'Nunito Sans', sans-serif; font-size: 11px; color: #888; text-align: center; line-height: 1.3; }

  .btn-guardar { background: linear-gradient(135deg, #5BBFEA, #A78BFA); border: none; border-radius: 20px; padding: 18px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 6px 20px #5BBFEA44; }
  .btn-guardar:active { transform: scale(0.97); }
  .btn-guardar:disabled { opacity: 0.6; }
  .btn-cancelar { background: #F0F7FF; border: none; border-radius: 16px; padding: 14px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 16px; color: #888; cursor: pointer; }

  .error { background: #FFF0EE; border: 2px solid #FF7E6B; border-radius: 14px; padding: 12px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: #FF7E6B; text-align: center; display: none; }
</style>
</head>
<body>
<div class="burbuja b1"></div><div class="burbuja b2"></div><div class="burbuja b3"></div><div class="burbuja b4"></div>

<!-- Modal agregar/editar hijo -->
<div class="modal-overlay" id="modalHijo">
  <div class="modal">
    <div class="modal-titulo" id="modalTitulo">👶 Agregar hijo</div>

    <div class="campo" id="campoNombre">
      <label>📝 Nombre del niño</label>
      <input type="text" id="nuevoNombre" placeholder="¿Cómo se llama?">
    </div>

    <div class="campo" id="campoAvatar">
      <label>🎨 Elegí un avatar</label>
      <div class="avatares">
        <div class="avatar-opcion seleccionado" onclick="elegirAvatar(this,'🦋')">🦋</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🦁')">🦁</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🐬')">🐬</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🦊')">🦊</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🐸')">🐸</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🦄')">🦄</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🐧')">🐧</div>
        <div class="avatar-opcion" onclick="elegirAvatar(this,'🐯')">🐯</div>
      </div>
    </div>

    <div class="campo">
      <label>🐣 Nivel de inicio</label>
      <div class="niveles-selector">
        <div class="nivel-opcion seleccionado" onclick="elegirNivel(this, 1)">
          <div class="nivel-opcion-animal">🥚</div>
          <div class="nivel-opcion-nombre">Huevo</div>
          <div class="nivel-opcion-desc">Emociones básicas</div>
        </div>
        <div class="nivel-opcion" onclick="elegirNivel(this, 2)">
          <div class="nivel-opcion-animal">🐣</div>
          <div class="nivel-opcion-nombre">Pollito</div>
          <div class="nivel-opcion-desc">Situaciones con contexto</div>
        </div>
        <div class="nivel-opcion" onclick="elegirNivel(this, 3)">
          <div class="nivel-opcion-animal">🐤</div>
          <div class="nivel-opcion-nombre">Pollito grande</div>
          <div class="nivel-opcion-desc">Emociones complejas</div>
        </div>
      </div>
    </div>

    <div class="error" id="errorModal"></div>
    <button class="btn-guardar" id="btnGuardar" onclick="guardarHijo()">✅ Guardar</button>
    <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<div class="contenedor">
  <div class="header">
    <img class="logo-img" src="TEAbrazo.png" alt="TEAbrazo">
    <button class="btn-salir" onclick="salir()">Salir 👋</button>
  </div>
  <div class="titulo">¿Quién juega hoy? 🎮</div>
  <div class="cargando" id="cargando"><div class="spinner"></div><div class="cargando-texto">Cargando perfiles...</div></div>
  <div class="vacio" id="vacio"><div class="vacio-emoji">👶</div><div class="vacio-texto">¡Agregá tu primer hijo!</div></div>
  <div class="grid-perfiles" id="gridPerfiles" style="display:none;"></div>
</div>

<script>
  const SUPABASE_URL = 'https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const COLORES = ['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
  const NIVELES = {
    1: { animal: '🥚', nombre: 'Huevo', xpInicio: 0 },
    2: { animal: '🐣', nombre: 'Pollito', xpInicio: 50 },
    3: { animal: '🐤', nombre: 'Pollito grande', xpInicio: 150 }
  };

  let avatarSeleccionado = '🦋';
  let nivelSeleccionado = 1;
  let sesionActual = null;
  let modoEdicion = false;
  let hijoEditandoId = null;

  window.addEventListener('load', async () => {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      sesionActual = session;
      await cargarPerfiles();
    } catch(e) { window.location.href = 'index.html'; }
  });

  async function cargarPerfiles() {
    document.getElementById('cargando').style.display = 'flex';
    document.getElementById('gridPerfiles').style.display = 'none';
    document.getElementById('vacio').style.display = 'none';
    try {
      const { data: hijos, error } = await sb.from('children').select('*').eq('padre_id', sesionActual.user.id).order('created_at', { ascending: true });
      if (error) throw error;
      document.getElementById('cargando').style.display = 'none';
      if (!hijos || hijos.length === 0) { document.getElementById('vacio').style.display = 'flex'; renderAgregarBoton(true); return; }
      renderPerfiles(hijos);
    } catch(e) {
      document.getElementById('cargando').style.display = 'none';
      document.getElementById('vacio').style.display = 'flex';
      renderAgregarBoton(true);
    }
  }

  function renderPerfiles(hijos) {
    const grid = document.getElementById('gridPerfiles');
    grid.style.display = 'grid'; grid.innerHTML = '';
    hijos.forEach((hijo, i) => {
      const color = COLORES[i % COLORES.length];
      const nivel = NIVELES[hijo.nivel] || NIVELES[1];
      const t = document.createElement('div');
      t.className = 'tarjeta-perfil';
      t.style.animationDelay = (i * 0.1) + 's';
      t.innerHTML = `
        <button class="btn-editar-nivel" onclick="abrirEdicion(event, ${JSON.stringify(hijo).replace(/"/g, '&quot;')})">✏️ Nivel</button>
        <div class="avatar-circulo" style="background:${color}22;">${hijo.avatar_emoji||'🦋'}</div>
        <div class="perfil-nombre">${hijo.nombre}</div>
        <div class="perfil-nivel">${nivel.animal} ${nivel.nombre}</div>
        <div class="perfil-xp">⚡ ${hijo.xp_total||0} XP</div>
      `;
      t.addEventListener('click', (e) => {
        if (!e.target.closest('.btn-editar-nivel')) seleccionarHijo(hijo);
      });
      grid.appendChild(t);
    });
    renderAgregarBoton(false);
  }

  function renderAgregarBoton(solo) {
    const grid = document.getElementById('gridPerfiles');
    if (solo) { grid.style.display = 'grid'; grid.innerHTML = ''; }
    const a = document.createElement('div');
    a.className = 'tarjeta-agregar';
    a.innerHTML = '<div class="agregar-icono">➕</div><div class="agregar-texto">Agregar hijo</div>';
    a.onclick = abrirCreacion;
    grid.appendChild(a);
  }

  function seleccionarHijo(hijo) {
    sessionStorage.setItem('hijoActual', JSON.stringify(hijo));
    window.location.href = 'bienvenida.html';
  }

  // Abrir modal para CREAR
  function abrirCreacion() {
    modoEdicion = false;
    hijoEditandoId = null;
    document.getElementById('modalTitulo').textContent = '👶 Agregar hijo';
    document.getElementById('campoNombre').style.display = 'flex';
    document.getElementById('campoAvatar').style.display = 'flex';
    document.getElementById('nuevoNombre').value = '';
    document.getElementById('errorModal').style.display = 'none';
    // Reset avatar y nivel
    avatarSeleccionado = '🦋';
    nivelSeleccionado = 1;
    document.querySelectorAll('.avatar-opcion').forEach((a,i) => a.classList.toggle('seleccionado', i===0));
    document.querySelectorAll('.nivel-opcion').forEach((n,i) => n.classList.toggle('seleccionado', i===0));
    document.getElementById('modalHijo').style.display = 'flex';
  }

  // Abrir modal para EDITAR nivel
  function abrirEdicion(e, hijo) {
    e.stopPropagation();
    modoEdicion = true;
    hijoEditandoId = hijo.id;
    document.getElementById('modalTitulo').textContent = '✏️ Cambiar nivel de ' + hijo.nombre;
    document.getElementById('campoNombre').style.display = 'none';
    document.getElementById('campoAvatar').style.display = 'none';
    document.getElementById('errorModal').style.display = 'none';
    // Marcar nivel actual
    nivelSeleccionado = hijo.nivel || 1;
    document.querySelectorAll('.nivel-opcion').forEach((n,i) => n.classList.toggle('seleccionado', i+1 === nivelSeleccionado));
    document.getElementById('modalHijo').style.display = 'flex';
  }

  function elegirAvatar(el, emoji) {
    document.querySelectorAll('.avatar-opcion').forEach(a => a.classList.remove('seleccionado'));
    el.classList.add('seleccionado');
    avatarSeleccionado = emoji;
  }

  function elegirNivel(el, nivel) {
    document.querySelectorAll('.nivel-opcion').forEach(n => n.classList.remove('seleccionado'));
    el.classList.add('seleccionado');
    nivelSeleccionado = nivel;
  }

  async function guardarHijo() {
    const errorEl = document.getElementById('errorModal');
    errorEl.style.display = 'none';
    document.getElementById('btnGuardar').disabled = true;

    try {
      if (modoEdicion) {
        // Solo actualizar nivel
        const xpInicio = NIVELES[nivelSeleccionado].xpInicio;
        const { error } = await sb.from('children')
          .update({ nivel: nivelSeleccionado, xp_total: xpInicio })
          .eq('id', hijoEditandoId);
        if (error) throw error;
      } else {
        // Crear hijo nuevo
        const nombre = document.getElementById('nuevoNombre').value.trim();
        if (!nombre) { errorEl.textContent = '⚠️ Escribí el nombre del niño'; errorEl.style.display = 'block'; return; }
        const xpInicio = NIVELES[nivelSeleccionado].xpInicio;
        const { error } = await sb.from('children').insert({
          padre_id: sesionActual.user.id,
          nombre,
          avatar_emoji: avatarSeleccionado,
          nivel: nivelSeleccionado,
          xp_total: xpInicio,
          racha_dias: 0
        });
        if (error) throw error;
      }
      cerrarModal();
      await cargarPerfiles();
    } catch(e) {
      errorEl.textContent = '❌ Error al guardar. Intentá de nuevo.';
      errorEl.style.display = 'block';
    } finally {
      document.getElementById('btnGuardar').disabled = false;
    }
  }

  function cerrarModal() { document.getElementById('modalHijo').style.display = 'none'; }
  async function salir() { await sb.auth.signOut(); window.location.href = 'index.html'; }
</script>
</body>
</html>
