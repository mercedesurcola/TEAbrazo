<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAbrazo — Ingresar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F0F7FF;
    font-family: 'Nunito Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .burbuja {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: flotar 6s ease-in-out infinite;
  }
  .b1 { width: 200px; height: 200px; background: #5BBFEA; top: -50px; left: -50px; }
  .b2 { width: 150px; height: 150px; background: #FFCC3B; top: 10%; right: -30px; animation-delay: 1s; }
  .b3 { width: 100px; height: 100px; background: #52D9A0; bottom: 15%; left: 10px; animation-delay: 2s; }
  .b4 { width: 120px; height: 120px; background: #A78BFA; bottom: -30px; right: 20%; animation-delay: 0.5s; }

  @keyframes flotar {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }

  .contenedor {
    z-index: 10;
    width: 100%;
    max-width: 400px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .mariposa {
    font-size: 64px;
    animation: volar 3s ease-in-out infinite;
  }

  @keyframes volar {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  .titulo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: #5BBFEA;
  }

  .titulo span { color: #A78BFA; }

  .subtitulo {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #888;
    text-align: center;
  }

  .card {
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    box-shadow: 0 8px 32px #5BBFEA22;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card-titulo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #333;
    text-align: center;
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .campo label {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #555;
  }

  .campo input {
    background: #F0F7FF;
    border: 2px solid #E0EFFF;
    border-radius: 16px;
    padding: 16px 18px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 16px;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .campo input:focus {
    border-color: #5BBFEA;
  }

  .btn-login {
    background: linear-gradient(135deg, #5BBFEA, #A78BFA);
    border: none;
    border-radius: 20px;
    padding: 18px;
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px #5BBFEA44;
    transition: transform 0.15s;
    margin-top: 4px;
  }

  .btn-login:active { transform: scale(0.97); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .separador {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #bbb;
    font-size: 14px;
  }

  .separador::before,
  .separador::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #eee;
  }

  .btn-registro {
    background: white;
    border: 2px solid #5BBFEA;
    border-radius: 20px;
    padding: 16px;
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #5BBFEA;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-registro:active {
    background: #F0F7FF;
    transform: scale(0.97);
  }

  .error {
    background: #FFF0EE;
    border: 2px solid #FF7E6B;
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #FF7E6B;
    text-align: center;
    display: none;
  }

  .cargando {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: #5BBFEA;
    font-size: 16px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid #E0EFFF;
    border-top-color: #5BBFEA;
    border-radius: 50%;
    animation: girar 0.8s linear infinite;
  }

  @keyframes girar {
    to { transform: rotate(360deg); }
  }

  /* Modal de registro */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #00000055;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal {
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 20px 60px #00000033;
  }

  .modal-titulo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #333;
    text-align: center;
  }

  .btn-cerrar {
    background: #F0F7FF;
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #888;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="burbuja b1"></div>
<div class="burbuja b2"></div>
<div class="burbuja b3"></div>
<div class="burbuja b4"></div>

<!-- Modal de registro -->
<div class="modal-overlay" id="modalRegistro">
  <div class="modal">
    <div class="modal-titulo">👋 Crear cuenta</div>
    <div class="campo">
      <label>📧 Tu email</label>
      <input type="email" id="regEmail" placeholder="nombre@email.com">
    </div>
    <div class="campo">
      <label>🔒 Contraseña</label>
      <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="error" id="errorRegistro"></div>
    <button class="btn-login" onclick="registrarse()">✨ Crear cuenta</button>
    <button class="btn-cerrar" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<div class="contenedor">

  <div class="logo">
    <span class="mariposa">🦋</span>
    <div class="titulo">TEA<span>brazo</span></div>
    <div class="subtitulo">Acceso para padres y tutores</div>
  </div>

  <div class="card">
    <div class="card-titulo">👋 ¡Hola de nuevo!</div>

    <div class="campo">
      <label>📧 Email</label>
      <input type="email" id="email" placeholder="nombre@email.com">
    </div>

    <div class="campo">
      <label>🔒 Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña">
    </div>

    <div class="error" id="errorLogin"></div>

    <div class="cargando" id="cargando">
      <div class="spinner"></div>
      Ingresando...
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">
      Ingresar 🚀
    </button>

    <div class="separador">¿Primera vez?</div>

    <button class="btn-registro" onclick="abrirModal()">
      ✨ Crear cuenta gratis
    </button>
  </div>

</div>

<script>
  // Configuración Supabase
  const SUPABASE_URL = 'https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya hay sesión activa, ir directo a perfiles
  window.addEventListener('load', async () => {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        window.location.href = 'perfiles.html';
      }
    } catch(e) {
      console.log('Sin sesión previa');
    }
  });

  function mostrarError(id, mensaje) {
    const el = document.getElementById(id);
    el.textContent = mensaje;
    el.style.display = 'block';
  }

  function ocultarError(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    ocultarError('errorLogin');

    if (!email || !password) {
      mostrarError('errorLogin', '⚠️ Completá el email y la contraseña');
      return;
    }

    // Mostrar cargando
    document.getElementById('btnLogin').disabled = true;
    document.getElementById('cargando').style.display = 'flex';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        mostrarError('errorLogin', '❌ Email o contraseña incorrectos');
        return;
      }

      // Login exitoso → ir a perfiles
      window.location.href = 'perfiles.html';

    } catch(e) {
      mostrarError('errorLogin', '⚠️ Error de conexión. Intentá de nuevo.');
    } finally {
      document.getElementById('btnLogin').disabled = false;
      document.getElementById('cargando').style.display = 'none';
    }
  }

  async function registrarse() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    ocultarError('errorRegistro');

    if (!email || !password) {
      mostrarError('errorRegistro', '⚠️ Completá todos los campos');
      return;
    }

    if (password.length < 6) {
      mostrarError('errorRegistro', '⚠️ La contraseña debe tener al menos 6 caracteres');
      return;
    }

    try {
      const { data, error } = await sb.auth.signUp({ email, password });

      if (error) {
        mostrarError('errorRegistro', '❌ ' + error.message);
        return;
      }

      // Registro exitoso
      cerrarModal();
      mostrarError('errorLogin', '✅ ¡Cuenta creada! Revisá tu email para confirmar y luego ingresá.');
      document.getElementById('errorLogin').style.background = '#F0FFF8';
      document.getElementById('errorLogin').style.borderColor = '#52D9A0';
      document.getElementById('errorLogin').style.color = '#2A9D6E';
      document.getElementById('errorLogin').style.display = 'block';

    } catch(e) {
      mostrarError('errorRegistro', '⚠️ Error de conexión. Intentá de nuevo.');
    }
  }

  function abrirModal() {
    document.getElementById('modalRegistro').style.display = 'flex';
  }

  function cerrarModal() {
    document.getElementById('modalRegistro').style.display = 'none';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    ocultarError('errorRegistro');
  }

  // Login con Enter
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
