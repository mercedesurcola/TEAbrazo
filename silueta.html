<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEAbrazo — Silueta</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#F0F7FF;font-family:'Nunito',sans-serif;width:100vw;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
  .burbuja{position:fixed;border-radius:50%;opacity:0.10;animation:flotar 6s ease-in-out infinite;z-index:0;pointer-events:none;}
  .b1{width:200px;height:200px;background:#5BBFEA;top:-60px;left:-60px;}
  .b2{width:140px;height:140px;background:#FFCC3B;top:5%;right:-30px;animation-delay:1s;}
  .b3{width:100px;height:100px;background:#52D9A0;bottom:15%;left:0;animation-delay:2s;}
  .b4{width:120px;height:120px;background:#A78BFA;bottom:-30px;right:10%;animation-delay:.5s;}
  @keyframes flotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

  .header-juego{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:white;box-shadow:0 2px 12px #5BBFEA15;flex-shrink:0;}
  .btn-salir{background:#F0F7FF;border:2px solid #E0EFFF;border-radius:14px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:#5BBFEA;cursor:pointer;}
  .header-centro{display:flex;align-items:center;gap:10px;}
  .nivel-badge{display:flex;align-items:center;gap:6px;background:#F0F7FF;border-radius:50px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:#555;}
  .nivel-emoji-b{font-size:18px;animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .puntaje-wrap{display:flex;align-items:center;gap:6px;background:#FFCC3B22;border:2px solid #FFCC3B44;border-radius:50px;padding:6px 14px;}
  .puntaje-texto{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#F0A500;}

  .area-principal{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 16px 10px;overflow:hidden;position:relative;z-index:10;gap:8px;}

  .nombre-figura{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(18px,5vw,24px);color:#333;text-align:center;}

  .canvas-wrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
  #siluetaCanvas{border-radius:24px;touch-action:none;cursor:crosshair;box-shadow:0 6px 28px #5BBFEA22;}

  .progreso-barra-wrap{width:100%;background:#E0EFFF;border-radius:50px;height:14px;overflow:hidden;}
  .progreso-barra{height:100%;background:linear-gradient(90deg,#52D9A0,#5BBFEA);border-radius:50px;transition:width 0.2s;width:0%;}
  .progreso-txt{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#5BBFEA;text-align:center;}

  .pupi-panel{display:flex;align-items:flex-end;gap:10px;width:100%;flex-shrink:0;}
  .pupi-emoji{font-size:clamp(34px,9vw,46px);animation:pupi-b 2s ease-in-out infinite;filter:drop-shadow(0 3px 8px #00000022);flex-shrink:0;}
  @keyframes pupi-b{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
  .pupi-burbuja{background:white;border-radius:18px 18px 18px 4px;padding:10px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(13px,3.8vw,15px);color:#333;max-width:240px;box-shadow:0 3px 16px #00000015;line-height:1.4;}

  @keyframes intro-bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
  @keyframes pupi-intro{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  @keyframes btn-llamar{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

  .countdown-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#F0F7FFee;}
  .countdown-numero{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(120px,35vw,200px);animation:num-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);line-height:1;}
  .countdown-ya{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(60px,18vw,100px);color:#52D9A0;animation:num-pop .5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes num-pop{from{transform:scale(0.2) rotate(-10deg);opacity:0}to{transform:scale(1);opacity:1}}

  .cel-overlay{position:fixed;inset:0;background:#00000066;z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
  .cel-card{background:white;border-radius:32px;padding:36px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:340px;animation:pop-in .4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop-in{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
  .cel-emoji{font-size:64px;}
  .cel-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(24px,7vw,30px);color:#333;text-align:center;}
  .cel-xp{background:linear-gradient(135deg,#FFCC3B,#FF7E6B);border-radius:50px;padding:10px 24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:white;}
  .btn-cel{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:20px;padding:16px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:white;cursor:pointer;}
  .btn-cel:active{transform:scale(0.97);}
  .btn-cel-sec{background:#F0F7FF;border:none;border-radius:16px;padding:12px;width:100%;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:#888;cursor:pointer;}

  .fin-overlay{position:fixed;inset:0;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:linear-gradient(135deg,#5BBFEA,#A78BFA);}
  .fin-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(48px,15vw,80px);color:white;text-align:center;}
  .fin-sub{font-family:'Nunito',sans-serif;font-weight:700;font-size:18px;color:rgba(255,255,255,0.85);text-align:center;}
  .fin-pupi{font-size:80px;}
  .fin-pin-wrap{background:white;border-radius:24px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:320px;}
  .fin-pin-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:#555;text-align:center;}
  .fin-pin-input{display:flex;gap:10px;justify-content:center;}
  .fin-pin-digito{width:56px;height:64px;border:3px solid #E0EFFF;border-radius:16px;background:#F0F7FF;text-align:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:#333;outline:none;}
  .fin-pin-digito:focus{border-color:#5BBFEA;}
  .fin-pin-error{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#FF7E6B;display:none;}
  .btn-fin-desbloquear{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:18px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:white;cursor:pointer;}

  .confeti{position:fixed;inset:0;pointer-events:none;z-index:700;display:none;}
  .confeti-pieza{position:absolute;border-radius:2px;animation:caer 1.8s ease-in forwards;}
  @keyframes caer{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

  .footer{position:relative;z-index:100;background:white;border-top:1px solid #E0EFFF;padding:5px 20px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .footer-marca{font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;color:#5BBFEA;}
  .footer-marca a{color:#5BBFEA;text-decoration:none;}
  .footer-legal{font-family:'Nunito Sans',sans-serif;font-size:9px;color:#aaa;text-align:center;}
</style>
</head>
<body>
<div class="burbuja b1"></div><div class="burbuja b2"></div><div class="burbuja b3"></div><div class="burbuja b4"></div>
<div class="confeti" id="confeti"></div>

<div id="introOverlay" style="position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:linear-gradient(135deg,#0d0d2b,#1a1a4e);">
  <div style="font-size:clamp(72px,20vw,110px);animation:intro-bounce 1s ease-in-out infinite;">✏️</div>
  <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(22px,6vw,32px);color:white;text-align:center;">¡Recorré la silueta!</div>
  <div style="display:flex;align-items:flex-end;gap:12px;max-width:360px;width:100%;">
    <div style="font-size:clamp(44px,12vw,64px);animation:pupi-intro 2s ease-in-out infinite;flex-shrink:0;">🐙</div>
    <div id="introTexto" style="background:white;border-radius:20px 20px 20px 4px;padding:14px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(15px,4.5vw,19px);color:#333;line-height:1.4;flex:1;"></div>
  </div>
  <button onclick="cerrarIntro()" style="background:linear-gradient(135deg,#52D9A0,#5BBFEA);border:none;border-radius:28px;padding:20px 0;width:100%;max-width:320px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,6vw,26px);color:white;cursor:pointer;animation:btn-llamar 2s ease-in-out infinite;">¡Listo! 🚀</button>
</div>

<div class="countdown-overlay" id="countdownOverlay">
  <div style="font-size:clamp(60px,18vw,90px);">🐙</div>
  <div id="countdownNumero" class="countdown-numero" style="color:#52D9A0;">3</div>
</div>

<div class="cel-overlay" id="celebracion">
  <div class="cel-card">
    <div class="cel-emoji" id="celEmoji">🎉</div>
    <div class="cel-titulo" id="celTitulo">¡EXCELENTE!</div>
    <div class="cel-xp" id="celXP">+15 XP ⚡</div>
    <button class="btn-cel" onclick="cerrarCelebracion()">¡Seguir! 🚀</button>
    <button class="btn-cel-sec" onclick="salir()">Volver al inicio</button>
  </div>
</div>

<div class="fin-overlay" id="finOverlay">
  <div class="fin-pupi">🐙</div><div class="fin-titulo">¡GRACIAS!</div><div class="fin-sub">¡Jugaste genial! 🌟</div>
  <div class="fin-pin-wrap">
    <div class="fin-pin-label">🔐 PIN para salir</div>
    <div class="fin-pin-input">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p1" oninput="avanzarPin(this,'p2')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p2" oninput="avanzarPin(this,'p3')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p3" oninput="avanzarPin(this,'p4')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p4" oninput="verificarPin()">
    </div>
    <div class="fin-pin-error" id="pinError">❌ PIN incorrecto.</div>
    <button class="btn-fin-desbloquear" onclick="verificarPin()">Desbloquear 🔓</button>
  </div>
</div>

<div class="header-juego">
  <button class="btn-salir" onclick="salir()">← Salir</button>
  <div class="header-centro">
    <div class="nivel-badge"><span class="nivel-emoji-b" id="nivelEmoji">🥚</span><span id="nivelNombre">Huevo</span></div>
  </div>
  <div class="puntaje-wrap">⭐ <span class="puntaje-texto" id="puntaje">0</span></div>
</div>

<div class="area-principal" id="areaPrincipal">
  <div class="nombre-figura" id="nombreFigura">⭕ Círculo</div>
  <div class="canvas-wrap"><canvas id="siluetaCanvas"></canvas></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:4px;">
    <div class="progreso-barra-wrap"><div class="progreso-barra" id="progresoBarra"></div></div>
    <div class="progreso-txt" id="progresoTxt">0% cubierto</div>
  </div>
  <div class="pupi-panel">
    <span class="pupi-emoji">🐙</span>
    <div class="pupi-burbuja" id="pupiTexto">¡Recorré la figura con el dedo! ✏️</div>
  </div>
</div>

<div class="footer">
  <div class="footer-marca">Un producto de <a href="https://www.cusol.com.ar" target="_blank">cusol.com.ar</a></div>
  <div class="footer-legal">© 2025 Cusol. Todos los derechos reservados.</div>
</div>

<script>
  const SUPABASE_URL='https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const {createClient}=supabase;
  const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

  // =============================================
  // SISTEMA DE NIVELES POR JUEGO
  // Flexible para N niveles futuros
  // =============================================
  const JUEGO_ID = 'silueta';
  const NIVEL_MAXIMO_JUEGO = 3;
  const RACHA_PARA_SUBIR = 3;
  const RACHA_PARA_BAJAR = 3;
  const UMBRAL_EXITO = 0.6;

  let progresoJuego = {nivel:1, racha_ok:0, racha_fail:0};

  async function cargarProgresoJuego(){
    if(!hijo)return;
    try{
      const {data,error}=await sb.from('game_progress').select('*').eq('hijo_id',hijo.id).eq('juego',JUEGO_ID).single();
      if(data&&!error){
        progresoJuego=data;
        nivelActual=data.nivel;
      }else{
        // Tabla no existe o sin registro: usar nivel del hijo
        nivelActual=hijo.nivel||1;
        // Intentar crear el registro, pero si falla no bloqueamos
        try{
          await sb.from('game_progress').insert({hijo_id:hijo.id,juego:JUEGO_ID,nivel:nivelActual,racha_ok:0,racha_fail:0,nivel_maximo:NIVEL_MAXIMO_JUEGO});
        }catch(e2){}
      }
    }catch(e){
      // Si falla cualquier cosa, usar nivel del hijo sin bloquear
      nivelActual=hijo.nivel||1;
    }finally{
      actualizarUIDeNivel();
    }
  }

  async function registrarResultadoPartida(aciertos,total){
    const exito=total>0?aciertos/total:0;
    const buena=exito>=UMBRAL_EXITO;
    if(buena){progresoJuego.racha_ok++;progresoJuego.racha_fail=0;}
    else{progresoJuego.racha_fail++;progresoJuego.racha_ok=0;}
    let cambio=null;
    const nivelMax=progresoJuego.nivel_maximo||NIVEL_MAXIMO_JUEGO;
    if(progresoJuego.racha_ok>=RACHA_PARA_SUBIR&&nivelActual<nivelMax){
      nivelActual++;progresoJuego.nivel=nivelActual;progresoJuego.racha_ok=0;cambio='subio';
    }
    if(progresoJuego.racha_fail>=RACHA_PARA_BAJAR&&nivelActual>1){
      nivelActual--;progresoJuego.nivel=nivelActual;progresoJuego.racha_fail=0;cambio='bajo';
    }
    try{
      await sb.from('game_progress').upsert({
        hijo_id:hijo.id,juego:JUEGO_ID,nivel:nivelActual,
        racha_ok:progresoJuego.racha_ok,racha_fail:progresoJuego.racha_fail,
        nivel_maximo:nivelMax,actualizado_at:new Date().toISOString(),
      },{onConflict:'hijo_id,juego'});
    }catch(e){}
    actualizarUIDeNivel();
    if(cambio)mostrarCambioDeNivel(cambio);
  }

  function actualizarUIDeNivel(){
    if(typeof NIVELES_CONFIG==='undefined')return;
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    const em=document.getElementById('nivelEmoji');const nm=document.getElementById('nivelNombre');
    if(em)em.textContent=nc.emoji;if(nm)nm.textContent=nc.nombre;
    actualizarEstrellas();
  }

  function actualizarEstrellas(){
    if(typeof NIVELES_CONFIG==='undefined')return;
    let el=document.getElementById('rachaStars');
    if(!el){
      el=document.createElement('div');el.id='rachaStars';
      el.style.cssText='font-size:11px;letter-spacing:1px;';
      const nm=document.getElementById('nivelNombre');
      if(nm&&nm.parentNode)nm.parentNode.appendChild(el);
    }
    const llenas=progresoJuego.racha_ok||0;
    let h='';for(let i=0;i<RACHA_PARA_SUBIR;i++)h+=i<llenas?'⭐':'·';
    el.textContent=h;
  }

  function mostrarCambioDeNivel(tipo){
    const msg=tipo==='subio'?'🎉 ¡Nivel '+nivelActual+'!':'💪 Nivel '+nivelActual;
    const n=document.createElement('div');
    n.style.cssText='position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:800;background:white;border-radius:20px;padding:10px 20px;font-family:Nunito,sans-serif;font-weight:900;font-size:16px;color:#333;box-shadow:0 6px 24px #00000022;white-space:nowrap;animation:npop 0.4s ease;';
    n.textContent=msg;document.body.appendChild(n);
    if(!document.getElementById('npop-style')){const s=document.createElement('style');s.id='npop-style';s.textContent='@keyframes npop{from{opacity:0;transform:translateX(-50%) scale(0.7)}to{opacity:1;transform:translateX(-50%) scale(1)}}';document.head.appendChild(s);}
    setTimeout(()=>n.remove(),2800);
    if(typeof _hablar==='function')_hablar(msg.replace(/[🎉💪]/g,''),1.0);
  }

  function appEstaSilenciada(){return localStorage.getItem('teabrazo_muted')==='1';}

  // =============================================
  // FIGURAS por nivel
  // Cada figura tiene nombre, emoji, y función que dibuja la silueta en canvas
  // =============================================
  const FIGURAS={
    1:[ // Nivel 1: formas geométricas básicas
      {nombre:'Círculo',    emoji:'⭕', dibujar:(ctx,w,h,r)=>{const cx=w/2,cy=h/2,rad=Math.min(w,h)*0.38;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke();}},
      {nombre:'Cuadrado',   emoji:'🟦', dibujar:(ctx,w,h,r)=>{const s=Math.min(w,h)*0.7,x=(w-s)/2,y=(h-s)/2;ctx.beginPath();ctx.rect(x,y,s,s);ctx.stroke();}},
      {nombre:'Triángulo',  emoji:'🔺', dibujar:(ctx,w,h,r)=>{const cx=w/2,s=Math.min(w,h)*0.75;ctx.beginPath();ctx.moveTo(cx,h/2-s*0.45);ctx.lineTo(cx+s/2,h/2+s*0.35);ctx.lineTo(cx-s/2,h/2+s*0.35);ctx.closePath();ctx.stroke();}},
      {nombre:'Rectángulo', emoji:'▬',  dibujar:(ctx,w,h,r)=>{const rw=w*0.75,rh=h*0.45,x=(w-rw)/2,y=(h-rh)/2;ctx.beginPath();ctx.rect(x,y,rw,rh);ctx.stroke();}},
    ],
    2:[ // Nivel 2: formas más complejas
      {nombre:'Manzana',    emoji:'🍎', dibujar:dibujarManzana},
      {nombre:'Estrella',   emoji:'⭐', dibujar:dibujarEstrella},
      {nombre:'Corazón',    emoji:'❤️', dibujar:dibujarCorazon},
      {nombre:'Gota',       emoji:'💧', dibujar:dibujarGota},
    ],
    3:[ // Nivel 3: siluetas más complejas
      {nombre:'Árbol',      emoji:'🌲', dibujar:dibujarArbol},
      {nombre:'Casa',       emoji:'🏠', dibujar:dibujarCasa},
      {nombre:'Flor',       emoji:'🌸', dibujar:dibujarFlor},
      {nombre:'Mariposa',   emoji:'🦋', dibujar:dibujarMariposa},
    ],
  };

  // Figuras nivel 2
  function dibujarManzana(ctx,w,h){
    const cx=w/2,cy=h/2+h*0.04;
    ctx.beginPath();
    ctx.moveTo(cx,cy-h*0.32);
    ctx.bezierCurveTo(cx+w*0.5,cy-h*0.32,cx+w*0.42,cy+h*0.35,cx,cy+h*0.35);
    ctx.bezierCurveTo(cx-w*0.42,cy+h*0.35,cx-w*0.5,cy-h*0.32,cx,cy-h*0.32);
    ctx.stroke();
    // Rabito
    ctx.beginPath();ctx.moveTo(cx,cy-h*0.32);ctx.quadraticCurveTo(cx+w*0.08,cy-h*0.42,cx+w*0.05,cy-h*0.44);ctx.stroke();
  }
  function dibujarEstrella(ctx,w,h){
    const cx=w/2,cy=h/2,r1=Math.min(w,h)*0.42,r2=r1*0.42,pts=5;
    ctx.beginPath();
    for(let i=0;i<pts*2;i++){const a=Math.PI/pts*i-Math.PI/2,r=i%2===0?r1:r2;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();ctx.stroke();
  }
  function dibujarCorazon(ctx,w,h){
    const cx=w/2,top=h*0.22,bot=h*0.82;
    ctx.beginPath();
    ctx.moveTo(cx,bot);
    ctx.bezierCurveTo(cx-w*0.5,h*0.55,cx-w*0.5,top,cx-w*0.22,top);
    ctx.bezierCurveTo(cx-w*0.08,top,cx,h*0.33,cx,h*0.35);
    ctx.bezierCurveTo(cx,h*0.33,cx+w*0.08,top,cx+w*0.22,top);
    ctx.bezierCurveTo(cx+w*0.5,top,cx+w*0.5,h*0.55,cx,bot);
    ctx.stroke();
  }
  function dibujarGota(ctx,w,h){
    const cx=w/2;
    ctx.beginPath();
    ctx.moveTo(cx,h*0.15);
    ctx.bezierCurveTo(cx+w*0.42,h*0.45,cx+w*0.38,h*0.82,cx,h*0.85);
    ctx.bezierCurveTo(cx-w*0.38,h*0.82,cx-w*0.42,h*0.45,cx,h*0.15);
    ctx.stroke();
  }

  // Figuras nivel 3
  function dibujarArbol(ctx,w,h){
    const cx=w/2;
    // Copa triangular triple
    ctx.beginPath();ctx.moveTo(cx,h*0.08);ctx.lineTo(cx+w*0.42,h*0.48);ctx.lineTo(cx-w*0.42,h*0.48);ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,h*0.28);ctx.lineTo(cx+w*0.35,h*0.62);ctx.lineTo(cx-w*0.35,h*0.62);ctx.closePath();ctx.stroke();
    // Tronco
    ctx.beginPath();ctx.rect(cx-w*0.08,h*0.62,w*0.16,h*0.28);ctx.stroke();
  }
  function dibujarCasa(ctx,w,h){
    const m=w*0.12;
    // Techo
    ctx.beginPath();ctx.moveTo(w/2,h*0.1);ctx.lineTo(w-m,h*0.42);ctx.lineTo(m,h*0.42);ctx.closePath();ctx.stroke();
    // Cuerpo
    ctx.beginPath();ctx.rect(m,h*0.42,w-m*2,h*0.48);ctx.stroke();
    // Puerta
    ctx.beginPath();ctx.rect(w/2-w*0.1,h*0.66,w*0.2,h*0.24);ctx.stroke();
    // Ventana
    ctx.beginPath();ctx.rect(m+w*0.1,h*0.5,w*0.18,h*0.14);ctx.stroke();
  }
  function dibujarFlor(ctx,w,h){
    const cx=w/2,cy=h/2,pr=Math.min(w,h)*0.15;
    // Pétalos
    for(let i=0;i<6;i++){
      const a=Math.PI/3*i;
      const px=cx+Math.cos(a)*pr*1.8,py=cy+Math.sin(a)*pr*1.8;
      ctx.beginPath();ctx.ellipse(px,py,pr,pr*0.65,a,0,Math.PI*2);ctx.stroke();
    }
    // Centro
    ctx.beginPath();ctx.arc(cx,cy,pr*0.75,0,Math.PI*2);ctx.stroke();
    // Tallo
    ctx.beginPath();ctx.moveTo(cx,cy+pr*0.75);ctx.quadraticCurveTo(cx+w*0.08,h*0.78,cx,h*0.9);ctx.stroke();
  }
  function dibujarMariposa(ctx,w,h){
    const cx=w/2,cy=h/2;
    // Ala superior izq
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.bezierCurveTo(cx-w*0.1,cy-h*0.35,cx-w*0.48,cy-h*0.3,cx-w*0.45,cy+h*0.05);ctx.bezierCurveTo(cx-w*0.35,cy+h*0.18,cx,cy,cx,cy);ctx.stroke();
    // Ala superior der
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.bezierCurveTo(cx+w*0.1,cy-h*0.35,cx+w*0.48,cy-h*0.3,cx+w*0.45,cy+h*0.05);ctx.bezierCurveTo(cx+w*0.35,cy+h*0.18,cx,cy,cx,cy);ctx.stroke();
    // Ala inferior izq
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.bezierCurveTo(cx-w*0.08,cy+h*0.1,cx-w*0.38,cy+h*0.35,cx-w*0.15,cy+h*0.4);ctx.bezierCurveTo(cx-w*0.05,cy+h*0.3,cx,cy,cx,cy);ctx.stroke();
    // Ala inferior der
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.bezierCurveTo(cx+w*0.08,cy+h*0.1,cx+w*0.38,cy+h*0.35,cx+w*0.15,cy+h*0.4);ctx.bezierCurveTo(cx+w*0.05,cy+h*0.3,cx,cy,cx,cy);ctx.stroke();
    // Cuerpo
    ctx.beginPath();ctx.ellipse(cx,cy,w*0.035,h*0.22,0,0,Math.PI*2);ctx.stroke();
  }

  const NIVELES_CONFIG={
    1:{emoji:'🥚',nombre:'Huevo',        xpPor:12, grosorPincel:28, umbralPct:70},
    2:{emoji:'🐣',nombre:'Pollito',       xpPor:16, grosorPincel:22, umbralPct:65},
    3:{emoji:'🐤',nombre:'Pollito grande',xpPor:22, grosorPincel:18, umbralPct:60},
  };
  const FIGURAS_POR_RONDA=4;

  let vocesGrabadas={};
  try{vocesGrabadas=JSON.parse(localStorage.getItem('voces_teabrazo')||'{}');}catch(e){}
  let audioActual=null;
  function reproducir(id){
    if(appEstaSilenciada())return;
    if(audioActual){audioActual.pause();audioActual.currentTime=0;}
    const tts={excelente:'¡Excelente!',que_bien:'¡Qué bien!',increible:'¡Increíble!',bien:'¡Bien!',upps:'¡Upps!',tres:'Tres',dos:'Dos',uno:'Uno',ya:'¡Ya!'};
    const a=new Audio(vocesGrabadas[id]||('audio/'+id+'.mp3'));audioActual=a;
    a.onerror=()=>{if(tts[id])_hablar(tts[id]);};a.play().catch(()=>a.onerror());
  }
  function _hablar(t,r=1.0){
    if(appEstaSilenciada())return;
    if(!('speechSynthesis' in window))return;
    window.speechSynthesis.cancel();
    const m=new SpeechSynthesisUtterance(t);m.lang='es-AR';m.rate=r;m.pitch=1.8;window.speechSynthesis.speak(m);
  }

  const INSTRUCCIONES_JUEGO={
    1:'¡Recorré la figura con el dedo sin levantar! Seguí la línea.',
    2:'¡Seguí la silueta completa con el dedo!',
    3:'¡Recorré toda la silueta sin despegar el dedo!',
  };
  function mostrarIntro(onDone){
    const overlay=document.getElementById('introOverlay');
    if(!overlay){onDone();return;}
    const texto=INSTRUCCIONES_JUEGO[nivelActual]||INSTRUCCIONES_JUEGO[1];
    document.getElementById('introTexto').textContent=texto;
    overlay.style.display='flex';window._introDone=onDone;
    setTimeout(()=>_hablar(texto,1.0),600);
  }
  function cerrarIntro(){
    document.getElementById('introOverlay').style.display='none';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    if(window._introDone)window._introDone();
  }

  let hijo=null,nivelActual=1,puntaje=0;
  let rondasJugadas=0,juegoActivo=false;
  let figurasRonda=[],figuraActualIdx=0;
  let dibujando=false,pixelesCubiertos=new Set(),totalPixelesSilueta=0;
  let siluetaImageData=null;

  window.addEventListener('load',()=>{
    const h=sessionStorage.getItem('hijoActual');
    if(!h){window.location.href='perfiles.html';return;}
    hijo=JSON.parse(h);puntaje=hijo.xp_total||0;nivelActual=1; // se sobreescribe con cargarProgresoJuego()
    document.getElementById('puntaje').textContent=puntaje;
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    document.getElementById('nivelEmoji').textContent=nc.emoji;document.getElementById('nivelNombre').textContent=nc.nombre;
    ajustarCanvas();window.addEventListener('resize',ajustarCanvas);
    cargarProgresoJuego().then(()=>{
      mostrarIntro(()=>setTimeout(()=>mostrarCountdown(),300));
    }).catch(()=>{
      // Si falla todo, arrancar igual
      nivelActual=hijo.nivel||1;
      actualizarUIDeNivel();
      mostrarIntro(()=>setTimeout(()=>mostrarCountdown(),300));
    });
  });

  function ajustarCanvas(){
    const area=document.getElementById('areaPrincipal');
    const canvas=document.getElementById('siluetaCanvas');
    const disponible=area.clientHeight-220;
    const tam=Math.min(area.clientWidth-32,disponible,360);
    canvas.width=tam;canvas.height=tam;
    canvas.style.width=tam+'px';canvas.style.height=tam+'px';
  }

  function mostrarCountdown(){
    const overlay=document.getElementById('countdownOverlay'),numEl=document.getElementById('countdownNumero');
    overlay.style.display='flex';
    const pasos=[{texto:'3',color:'#FF7E6B',audio:'tres'},{texto:'2',color:'#FFCC3B',audio:'dos'},{texto:'1',color:'#52D9A0',audio:'uno'},{texto:'¡YA!',color:'#5BBFEA',audio:'ya',esYa:true}];
    let i=0;
    function sig(){if(i>=pasos.length){overlay.style.display='none';iniciarJuego();return;}const p=pasos[i];numEl.className=p.esYa?'countdown-ya':'countdown-numero';numEl.style.color=p.color;numEl.textContent=p.texto;numEl.style.animation='none';numEl.offsetHeight;numEl.style.animation='';reproducir(p.audio);i++;setTimeout(sig,900);}
    sig();
  }

  function iniciarJuego(){
    juegoActivo=true;rondasJugadas=0;
    figurasRonda=[...FIGURAS[nivelActual]||FIGURAS[1]].sort(()=>Math.random()-0.5).slice(0,FIGURAS_POR_RONDA);
    figuraActualIdx=0;
    nuevaFigura();
  }

  function nuevaFigura(){
    if(!juegoActivo)return;
    if(figuraActualIdx>=figurasRonda.length){mostrarCelebracion();return;}
    const figura=figurasRonda[figuraActualIdx];
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    const canvas=document.getElementById('siluetaCanvas');
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height;

    // Limpiar
    ctx.clearRect(0,0,w,h);
    pixelesCubiertos=new Set();

    // Dibujar silueta punteada/guiada
    ctx.strokeStyle='#C0D8FF';
    ctx.lineWidth=nc.grosorPincel+4;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.setLineDash([12,10]);
    figura.dibujar(ctx,w,h);
    ctx.setLineDash([]);

    // Guardar máscara de la silueta
    siluetaImageData=ctx.getImageData(0,0,w,h);
    // Contar píxeles de la silueta
    totalPixelesSilueta=0;
    for(let i=3;i<siluetaImageData.data.length;i+=4){if(siluetaImageData.data[i]>50)totalPixelesSilueta++;}

    document.getElementById('nombreFigura').textContent=figura.emoji+' '+figura.nombre;
    document.getElementById('progresoBarra').style.width='0%';
    document.getElementById('progresoTxt').textContent='0% cubierto';
    mostrarPupi('¡Recorré la '+figura.nombre+' con el dedo! ✏️');
    _hablar('Recorré la '+figura.nombre,1.0);

    // Eventos de toque
    canvas.onpointerdown=e=>{e.preventDefault();dibujando=true;dibujarTrazo(e);};
    canvas.onpointermove=e=>{e.preventDefault();if(dibujando)dibujarTrazo(e);};
    canvas.onpointerup=e=>{dibujando=false;};
    canvas.onpointercancel=e=>{dibujando=false;};
  }

  function dibujarTrazo(e){
    if(!juegoActivo)return;
    const canvas=document.getElementById('siluetaCanvas');
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;const y=e.clientY-rect.top;
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    const ctx=canvas.getContext('2d');

    // Pintar trazo del niño
    ctx.strokeStyle='#52D9A0';
    ctx.lineWidth=nc.grosorPincel;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.arc(x,y,nc.grosorPincel/2,0,Math.PI*2);ctx.fillStyle='#52D9A0';ctx.fill();

    // Registrar píxeles cubiertos que coinciden con la silueta
    const radio=nc.grosorPincel/2;
    for(let dy=-radio;dy<=radio;dy++){
      for(let dx=-radio;dx<=radio;dx++){
        if(dx*dx+dy*dy<=radio*radio){
          const px=Math.round(x+dx),py=Math.round(y+dy);
          if(px>=0&&px<canvas.width&&py>=0&&py<canvas.height){
            const idx=(py*canvas.width+px)*4+3;
            if(siluetaImageData&&siluetaImageData.data[idx]>50){
              pixelesCubiertos.add(py*canvas.width+px);
            }
          }
        }
      }
    }

    // Actualizar progreso
    const pct=Math.min(100,Math.round(pixelesCubiertos.size/Math.max(totalPixelesSilueta,1)*100));
    document.getElementById('progresoBarra').style.width=pct+'%';
    document.getElementById('progresoTxt').textContent=pct+'% cubierto';

    if(pct>=(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).umbralPct){
      canvas.onpointerdown=null;canvas.onpointermove=null;
      figuraSuperada();
    }
  }

  function figuraSuperada(){
    rondasJugadas++;
    puntaje+=(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor;
    document.getElementById('puntaje').textContent=puntaje;
    reproducir('bien');
    mostrarPupi('¡Genial! 🌟');

    // Efecto: rellenar con color
    const canvas=document.getElementById('siluetaCanvas');
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#52D9A044';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    figuraActualIdx++;
    setTimeout(()=>{
      if(figuraActualIdx>=figurasRonda.length){mostrarCelebracion();}
      else{nuevaFigura();}
    },1200);
  }

  function mostrarPupi(t){document.getElementById('pupiTexto').textContent=t;}

  function mostrarCelebracion(){
    const frases=[{texto:'¡EXCELENTE!',audio:'excelente'},{texto:'¡QUÉ BIEN!',audio:'que_bien'},{texto:'¡INCREÍBLE!',audio:'increible'}];
    const f=frases[Math.floor(Math.random()*frases.length)];
    const xp=FIGURAS_POR_RONDA*(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor;
    document.getElementById('celEmoji').textContent=figurasRonda[0]?.emoji||'🎉';
    document.getElementById('celTitulo').textContent=f.texto;
    document.getElementById('celXP').textContent='+'+xp+' XP ⚡';
    document.getElementById('celebracion').style.display='flex';
    lanzarConfeti();reproducir(f.audio);guardarProgreso(rondasCorrectas||partesCorrectas||juegosCorrectos||0, rondasJugadas||partesJugadas||juegosEnRonda||RONDAS_POR_CELEBRACION||5);
  }
  function cerrarCelebracion(){
    document.getElementById('celebracion').style.display='none';
    figurasRonda=[...FIGURAS[nivelActual]||FIGURAS[1]].sort(()=>Math.random()-0.5).slice(0,FIGURAS_POR_RONDA);
    figuraActualIdx=0;rondasJugadas=0;nuevaFigura();
  }

  function lanzarConfeti(){
    const c=document.getElementById('confeti');c.style.display='block';c.innerHTML='';
    const cols=['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
    for(let i=0;i<80;i++){const p=document.createElement('div');p.className='confeti-pieza';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1+'s';p.style.width=(Math.random()*10+6)+'px';p.style.height=(Math.random()*10+6)+'px';c.appendChild(p);}
    setTimeout(()=>{c.style.display='none';c.innerHTML='';},2500);
  }
  function avanzarPin(el,sigId){if(el.value.length===1){const s=document.getElementById(sigId);if(s)s.focus();}}
  function verificarPin(){
    const ing=['p1','p2','p3','p4'].map(id=>document.getElementById(id).value).join('');
    const pin=hijo.pin?hijo.pin.toString():'';
    if(!pin||ing===pin)window.location.href='perfiles.html';
    else{document.getElementById('pinError').style.display='block';['p1','p2','p3','p4'].forEach(id=>document.getElementById(id).value='');document.getElementById('p1').focus();}
  }
  async function guardarProgreso(aciertos=0,total=0){
    await registrarResultadoPartida(aciertos,total);
    try{await sb.from('children').update({xp_total:puntaje}).eq('id',hijo.id);hijo.xp_total=puntaje;sessionStorage.setItem('hijoActual',JSON.stringify(hijo));}catch(e){}
  }
  function salir(){juegoActivo=false;window.speechSynthesis?.cancel();window.location.href='bienvenida.html';}
</script>
</body>
</html>
