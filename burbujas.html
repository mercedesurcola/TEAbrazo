<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEAbrazo — Burbujas Mágicas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0a1628; font-family: 'Nunito', sans-serif; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }

  .fondo { position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 20%, #1a2a5e 0%, #0a1628 60%); z-index: 0; }
  .estrella-fondo { position: absolute; border-radius: 50%; background: white; opacity: 0; animation: titilar var(--dur) ease-in-out infinite; }
  @keyframes titilar { 0%,100%{opacity:0;transform:scale(0.8)} 50%{opacity:var(--op);transform:scale(1)} }

  .header-juego { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: linear-gradient(180deg, #0a1628ee 0%, transparent 100%); }
  .btn-salir-juego { background: #ffffff22; border: 2px solid #ffffff33; border-radius: 14px; padding: 8px 14px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: white; cursor: pointer; }
  .puntaje-wrap { display: flex; align-items: center; gap: 6px; background: #ffffff22; border: 2px solid #ffffff33; border-radius: 50px; padding: 6px 14px; }
  .puntaje-texto { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: #FFCC3B; }

  .consigna-panel { position: fixed; top: 60px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 16px; }
  .consigna-card { background: #ffffff22; backdrop-filter: blur(12px); border: 2px solid #ffffff33; border-radius: 20px; padding: 10px 20px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: clamp(14px, 4vw, 18px); color: white; text-align: center; }

  .area-juego { position: fixed; inset: 0; z-index: 10; }

  .burbuja { position: absolute; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; user-select: none; touch-action: manipulation; box-shadow: inset -4px -4px 12px rgba(0,0,0,0.2), inset 2px 2px 8px rgba(255,255,255,0.4); animation: subir linear forwards; }
  .burbuja::before { content: ''; position: absolute; top: 15%; left: 20%; width: 30%; height: 20%; background: rgba(255,255,255,0.5); border-radius: 50%; transform: rotate(-30deg); }
  @keyframes subir { 0%{transform:translateY(0) translateX(0);opacity:0} 5%{opacity:1} 90%{opacity:1} 100%{transform:translateY(calc(-100vh - 120px)) translateX(var(--drift));opacity:0} }

  .particula { position: absolute; border-radius: 50%; animation: volar-particula 0.7s ease forwards; }
  @keyframes volar-particula { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }
  .anillo-ok { position: absolute; border-radius: 50%; border: 4px solid #52D9A0; pointer-events: none; z-index: 51; animation: anillo 0.5s ease forwards; }
  .anillo-error { position: absolute; border-radius: 50%; border: 4px solid #FF4444; pointer-events: none; z-index: 51; animation: anillo 0.5s ease forwards; }
  @keyframes anillo { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2.5);opacity:0} }

  .poli-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: flex-end; padding: 0 16px 16px; gap: 10px; pointer-events: none; }
  .poli-emoji { font-size: clamp(40px, 12vw, 56px); animation: poli-bounce 2s ease-in-out infinite; filter: drop-shadow(0 4px 12px #00000044); flex-shrink: 0; }
  @keyframes poli-bounce { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
  .poli-burbuja-texto { background: white; border-radius: 20px 20px 20px 4px; padding: 12px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: clamp(13px, 4vw, 16px); color: #333; max-width: 220px; box-shadow: 0 4px 20px #00000033; line-height: 1.4; animation: aparecer-txt 0.3s ease; }
  @keyframes aparecer-txt { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .celebracion-overlay { position: fixed; inset: 0; background: #00000066; z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
  .celebracion-card { background: white; border-radius: 32px; padding: 36px 28px; display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 340px; animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop-in { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .cel-emoji { font-size: 64px; }
  .cel-titulo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(22px, 6vw, 28px); color: #333; text-align: center; }
  .cel-xp { background: linear-gradient(135deg, #FFCC3B, #FF7E6B); border-radius: 50px; padding: 10px 24px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: white; }
  .btn-cel { background: linear-gradient(135deg, #5BBFEA, #A78BFA); border: none; border-radius: 20px; padding: 16px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: white; cursor: pointer; }
  .btn-cel:active { transform: scale(0.97); }
  .btn-cel-sec { background: #F0F7FF; border: none; border-radius: 16px; padding: 12px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 16px; color: #888; cursor: pointer; }

  .confeti { position: fixed; inset: 0; pointer-events: none; z-index: 600; display: none; }
  .confeti-pieza { position: absolute; border-radius: 2px; animation: caer 1.8s ease-in forwards; }
  @keyframes caer { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="fondo" id="fondo"></div>
<div class="confeti" id="confeti"></div>
<div class="area-juego" id="areaJuego"></div>

<div class="header-juego">
  <button class="btn-salir-juego" onclick="salir()">← Salir</button>
  <div class="puntaje-wrap">⭐ <span class="puntaje-texto" id="puntaje">0</span></div>
</div>

<div class="consigna-panel">
  <div class="consigna-card" id="consignaCard">¡Tocá cualquier burbuja! 🫧</div>
</div>

<div class="poli-panel">
  <span class="poli-emoji">🐙</span>
  <div class="poli-burbuja-texto" id="poliTexto">¡Hola! Soy Poli 🐙</div>
</div>

<div class="celebracion-overlay" id="celebracion">
  <div class="celebracion-card">
    <div class="cel-emoji">🎉</div>
    <div class="cel-titulo" id="celTitulo">¡EXCELENTE!</div>
    <div class="cel-xp" id="celXP">+10 XP ⚡</div>
    <button class="btn-cel" onclick="cerrarCelebracion()">¡Seguir jugando! 🚀</button>
    <button class="btn-cel-sec" onclick="salir()">Volver al inicio</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // =============================================
  // AUDIO — usa MP3 grabados, fallback a síntesis
  // =============================================
  const AUDIO_BASE = 'audio/';
  let audioActual = null;

  function reproducir(archivo) {
    try {
      if (audioActual) { audioActual.pause(); audioActual.currentTime = 0; }
      audioActual = new Audio(AUDIO_BASE + archivo + '.mp3');
      audioActual.play().catch(() => {});
    } catch(e) {}
  }

  function sonidoBurbuja(correcto) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const bufferSize = ctx.sampleRate * 0.15;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = correcto ? 1800 : 400;
      filter.Q.value = 8;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(correcto ? 0.4 : 0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      source.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      source.start();
    } catch(e) {}
  }

  // =============================================
  // CONFIG POR NIVEL
  // =============================================
  const CONFIG_NIVEL = {
    1: {
      consigna: '¡Tocá cualquier burbuja! 🫧',
      colorObjetivo: null, velocidad: 13, tamMin: 75, tamMax: 115, xpPor: 5,
      audiosCorrecto: ['bien','genial','si','bravo','excelente'],
      audioError: null,
      introAudio: 'hola',
      introTexto: '¡Hola! Soy Poli 🐙'
    },
    2: {
      consigna: '¡Tocá la burbuja ROJA! 🔴',
      colorObjetivo: 'rojo', velocidad: 10, tamMin: 65, tamMax: 95, xpPor: 8,
      audiosCorrecto: ['bien','genial','excelente','que_bien'],
      audioError: 'esa_no',
      introAudio: 'hola',
      introTexto: '¡Tocá solo la ROJA! 🔴'
    },
    3: {
      consigna: '¡Tocá el color que digo! 🔊',
      colorObjetivo: 'dinamico', velocidad: 8, tamMin: 55, tamMax: 85, xpPor: 12,
      audiosCorrecto: ['excelente','increible','genial','que_bien'],
      audioError: 'esa_no',
      introAudio: 'hola',
      introTexto: '¡Tocá el color que yo diga! 🐙'
    }
  };

  const COLORES = [
    { nombre:'rojo',     hex:'#FF3B3B', sombra:'#FF000066' },
    { nombre:'azul',     hex:'#5BBFEA', sombra:'#5BBFEA66' },
    { nombre:'verde',    hex:'#52D9A0', sombra:'#52D9A066' },
    { nombre:'amarillo', hex:'#FFCC3B', sombra:'#FFCC3B66' },
    { nombre:'violeta',  hex:'#A78BFA', sombra:'#A78BFA66' },
    { nombre:'naranja',  hex:'#FF7E6B', sombra:'#FF7E6B66' },
  ];

  let hijo = null, nivelActual = 1, config = null;
  let puntaje = 0, burbujaCorrectas = 0;
  let intervaloBurbujas = null, burbujasEnPantalla = [];
  let juegoActivo = false, colorAnunciado = null;

  // =============================================
  // INICIO
  // =============================================
  window.addEventListener('load', () => {
    crearEstrellas();
    const hijoData = sessionStorage.getItem('hijoActual');
    if (!hijoData) { window.location.href = 'perfiles.html'; return; }
    hijo = JSON.parse(hijoData);
    puntaje = hijo.xp_total || 0;
    nivelActual = hijo.nivel || 1;
    config = CONFIG_NIVEL[nivelActual] || CONFIG_NIVEL[1];
    document.getElementById('consignaCard').textContent = config.consigna;
    document.getElementById('puntaje').textContent = puntaje;

    setTimeout(() => {
      mostrarPoli(config.introTexto);
      reproducir(config.introAudio);
      setTimeout(iniciarJuego, 2500);
    }, 500);
  });

  function crearEstrellas() {
    const fondo = document.getElementById('fondo');
    for (let i = 0; i < 35; i++) {
      const s = document.createElement('div');
      s.className = 'estrella-fondo';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--op:${Math.random()*0.5+0.2};animation-delay:${Math.random()*4}s`;
      fondo.appendChild(s);
    }
  }

  // =============================================
  // JUEGO
  // =============================================
  function iniciarJuego() {
    juegoActivo = true;
    burbujasEnPantalla = [];
    burbujaCorrectas = 0;
    if (nivelActual === 3) anunciarColor();
    crearBurbuja();
    intervaloBurbujas = setInterval(() => {
      if (juegoActivo && burbujasEnPantalla.length < 7) crearBurbuja();
    }, 1600);
  }

  function crearBurbuja() {
    const area = document.getElementById('areaJuego');
    const colorData = COLORES[Math.floor(Math.random() * COLORES.length)];
    const tam = Math.floor(Math.random() * (config.tamMax - config.tamMin) + config.tamMin);
    const dur = config.velocidad + Math.random() * 4;
    const drift = (Math.random() - 0.5) * 100;
    const margen = 20;
    const posX = margen + Math.random() * (window.innerWidth - tam - margen * 2);
    const posY = window.innerHeight + tam + 10;

    const b = document.createElement('div');
    b.className = 'burbuja';
    b.dataset.color = colorData.nombre;
    b.style.cssText = `width:${tam}px;height:${tam}px;left:${posX}px;top:${posY}px;background:radial-gradient(circle at 35% 35%, ${colorData.hex}ee, ${colorData.hex}77);box-shadow:0 0 24px ${colorData.sombra},inset -4px -4px 12px rgba(0,0,0,0.15),inset 2px 2px 8px rgba(255,255,255,0.45);--drift:${drift}px;animation-duration:${dur}s;`;

    if (nivelActual === 1) {
      const emojis = ['🌟','⭐','✨','💫','🌈','🎈'];
      b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    }

    b.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); tocarBurbuja(b, colorData); });
    area.appendChild(b);
    burbujasEnPantalla.push(b);
    b.addEventListener('animationend', () => { b.remove(); burbujasEnPantalla = burbujasEnPantalla.filter(x => x !== b); });
  }

  function tocarBurbuja(b, colorData) {
    if (!juegoActivo || !b.parentNode) return;
    const esCorrecta = esRespuestaCorrecta(colorData.nombre);
    const rect = b.getBoundingClientRect();
    explotar(rect, colorData.hex, esCorrecta);
    b.remove();
    burbujasEnPantalla = burbujasEnPantalla.filter(x => x !== b);
    sonidoBurbuja(esCorrecta);

    if (esCorrecta) {
      burbujaCorrectas++;
      puntaje += config.xpPor;
      document.getElementById('puntaje').textContent = puntaje;
      const audios = config.audiosCorrecto;
      const audio = audios[Math.floor(Math.random() * audios.length)];
      const textos = { bien:'¡BIEN! 🎉', genial:'¡GENIAL! ⭐', si:'¡SÍ! 🌟', bravo:'¡BRAVO! 🎊', excelente:'¡EXCELENTE! 🏆', que_bien:'¡QUÉ BIEN! 💫', increible:'¡INCREÍBLE! 🔥' };
      mostrarPoli(textos[audio] || '¡BIEN! 🎉');
      reproducir(audio);
      if (burbujaCorrectas > 0 && burbujaCorrectas % 5 === 0) setTimeout(mostrarCelebracion, 400);
    } else if (nivelActual > 1) {
      mostrarPoli('¡Esa no! 🔴');
      reproducir('esa_no');
    }
  }

  function esRespuestaCorrecta(color) {
    if (nivelActual === 1) return true;
    if (nivelActual === 2) return color === 'rojo';
    if (nivelActual === 3) return color === colorAnunciado;
    return true;
  }

  function anunciarColor() {
    if (!juegoActivo) return;
    const cols = ['rojo','azul','verde','amarillo'];
    colorAnunciado = cols[Math.floor(Math.random() * cols.length)];
    const emojis = { rojo:'🔴', azul:'🔵', verde:'🟢', amarillo:'🟡' };
    mostrarPoli(emojis[colorAnunciado] + ' ¡' + colorAnunciado.toUpperCase() + '!');
    reproducir(colorAnunciado === 'rojo' ? 'la_roja' : colorAnunciado);
    document.getElementById('consignaCard').textContent = '¡Tocá la ' + colorAnunciado + '! ' + emojis[colorAnunciado];
    setTimeout(() => { if (juegoActivo) anunciarColor(); }, 5000);
  }

  // =============================================
  // EXPLOSIÓN
  // =============================================
  function explotar(rect, color, correcto) {
    const area = document.getElementById('areaJuego');
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const size = rect.width;
    const anillo = document.createElement('div');
    anillo.className = correcto ? 'anillo-ok' : 'anillo-error';
    anillo.style.cssText = `left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;`;
    area.appendChild(anillo);
    setTimeout(() => anillo.remove(), 600);
    if (!correcto) return;
    const cols = ['#FFCC3B','#52D9A0','#5BBFEA','#A78BFA','#FF7E6B', color];
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      p.className = 'particula';
      const ang = (i / 14) * Math.PI * 2;
      const dist = 50 + Math.random() * 70;
      const s = Math.random() * 12 + 6;
      p.style.cssText = `left:${cx-s/2}px;top:${cy-s/2}px;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;`;
      area.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  function mostrarPoli(texto) {
    const el = document.getElementById('poliTexto');
    el.style.animation = 'none'; el.offsetHeight;
    el.style.animation = 'aparecer-txt 0.3s ease';
    el.textContent = texto;
  }

  // =============================================
  // CELEBRACIÓN
  // =============================================
  function mostrarCelebracion() {
    juegoActivo = false;
    clearInterval(intervaloBurbujas);
    const frases = [
      { texto: '¡EXCELENTE!', audio: 'excelente' },
      { texto: '¡QUÉ BIEN!',  audio: 'que_bien' },
      { texto: '¡INCREÍBLE!', audio: 'increible' },
    ];
    const f = frases[Math.floor(Math.random() * frases.length)];
    document.getElementById('celTitulo').textContent = f.texto;
    document.getElementById('celXP').textContent = '+' + (burbujaCorrectas * config.xpPor) + ' XP ⚡';
    document.getElementById('celebracion').style.display = 'flex';
    lanzarConfeti();
    reproducir(f.audio);
    guardarProgreso();
  }

  function cerrarCelebracion() {
    document.getElementById('celebracion').style.display = 'none';
    burbujaCorrectas = 0;
    juegoActivo = true;
    crearBurbuja();
    intervaloBurbujas = setInterval(() => {
      if (juegoActivo && burbujasEnPantalla.length < 7) crearBurbuja();
    }, 1600);
    mostrarPoli('¡Seguimos! 🐙');
    reproducir('seguimos');
  }

  async function guardarProgreso() {
    try {
      const nuevoNivel = puntaje >= 150 ? 3 : puntaje >= 50 ? 2 : 1;
      await sb.from('children').update({ xp_total: puntaje, nivel: nuevoNivel }).eq('id', hijo.id);
      hijo.xp_total = puntaje; sessionStorage.setItem('hijoActual', JSON.stringify(hijo));
    } catch(e) {}
  }

  function lanzarConfeti() {
    const confeti = document.getElementById('confeti');
    confeti.style.display = 'block'; confeti.innerHTML = '';
    const cols = ['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'confeti-pieza';
      p.style.left = Math.random()*100+'vw'; p.style.top='-10px';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDelay = Math.random()*1+'s';
      p.style.width=(Math.random()*10+6)+'px'; p.style.height=(Math.random()*10+6)+'px';
      confeti.appendChild(p);
    }
    setTimeout(() => { confeti.style.display='none'; confeti.innerHTML=''; }, 2500);
  }

  function salir() {
    juegoActivo = false;
    clearInterval(intervaloBurbujas);
    window.location.href = 'bienvenida.html';
  }
</script>
</body>
</html>
