<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEAbrazo — Burbujas Mágicas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a1628;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Fondo estrellado */
  .fondo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 30% 20%, #1a2a5e 0%, #0a1628 60%);
    z-index: 0;
  }

  .estrella-fondo {
    position: absolute;
    border-radius: 50%;
    background: white;
    opacity: 0;
    animation: titilar var(--dur) ease-in-out infinite;
  }

  @keyframes titilar {
    0%, 100% { opacity: 0; transform: scale(0.8); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  /* Header del juego */
  .header-juego {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: linear-gradient(180deg, #0a1628ee 0%, transparent 100%);
  }

  .btn-salir-juego {
    background: #ffffff22;
    border: 2px solid #ffffff33;
    border-radius: 14px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: white;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }

  .puntaje-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #ffffff22;
    border: 2px solid #ffffff33;
    border-radius: 50px;
    padding: 8px 16px;
    backdrop-filter: blur(8px);
  }

  .puntaje-texto {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #FFCC3B;
  }

  /* Área de juego */
  .area-juego {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
  }

  /* Burbujas */
  .burbuja {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    user-select: none;
    transition: transform 0.1s;
    box-shadow: inset -4px -4px 12px rgba(0,0,0,0.2), inset 2px 2px 8px rgba(255,255,255,0.4);
    animation: subir linear forwards;
    will-change: transform;
  }

  .burbuja::before {
    content: '';
    position: absolute;
    top: 15%;
    left: 20%;
    width: 30%;
    height: 20%;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  .burbuja:active { transform: scale(0.9); }

  @keyframes subir {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(calc(-100vh - 100px)) translateX(var(--drift)); opacity: 0; }
  }

  /* Explosión */
  .explosion {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    animation: explotar 0.6s ease forwards;
  }

  @keyframes explotar {
    0% { transform: scale(0); opacity: 1; }
    50% { transform: scale(2.5); opacity: 0.8; }
    100% { transform: scale(4); opacity: 0; }
  }

  .particula {
    position: absolute;
    border-radius: 50%;
    animation: volar-particula 0.7s ease forwards;
  }

  @keyframes volar-particula {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* Panel de Poli */
  .poli-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: flex-end;
    padding: 0 20px 20px;
    gap: 12px;
    pointer-events: none;
  }

  .poli-burbuja-texto {
    background: white;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #333;
    max-width: 260px;
    box-shadow: 0 4px 20px #00000033;
    animation: aparecer-texto 0.3s ease;
    line-height: 1.4;
  }

  @keyframes aparecer-texto {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .poli-emoji {
    font-size: 52px;
    animation: poli-bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px #00000044);
    flex-shrink: 0;
  }

  @keyframes poli-bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }

  /* Consigna del nivel */
  .consigna-panel {
    position: fixed;
    top: 70px; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 0 20px;
  }

  .consigna-card {
    background: #ffffff22;
    backdrop-filter: blur(12px);
    border: 2px solid #ffffff33;
    border-radius: 20px;
    padding: 12px 24px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: white;
    text-align: center;
    text-shadow: 0 1px 4px #00000044;
  }

  .consigna-color {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    vertical-align: middle;
    margin: 0 4px;
    box-shadow: 0 0 8px currentColor;
  }

  /* Celebración grande */
  .celebracion-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #00000066;
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .celebracion-card {
    background: white;
    border-radius: 32px;
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 90%;
    max-width: 360px;
    animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .cel-emoji { font-size: 72px; }
  .cel-titulo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; color: #333; text-align: center; }
  .cel-xp { background: linear-gradient(135deg, #FFCC3B, #FF7E6B); border-radius: 50px; padding: 10px 28px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; color: white; }
  .cel-sub { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px; color: #888; text-align: center; }

  .btn-cel { background: linear-gradient(135deg, #5BBFEA, #A78BFA); border: none; border-radius: 20px; padding: 16px; width: 100%; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: white; cursor: pointer; }
  .btn-cel:active { transform: scale(0.97); }

  /* Confeti */
  .confeti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 600; display: none; }
  .confeti-pieza { position: absolute; border-radius: 2px; animation: caer 1.8s ease-in forwards; }
  @keyframes caer { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="fondo" id="fondo"></div>
<div class="confeti" id="confeti"></div>
<div class="area-juego" id="areaJuego"></div>

<!-- Header -->
<div class="header-juego">
  <button class="btn-salir-juego" onclick="salir()">← Salir</button>
  <div class="puntaje-wrap">
    <span>⭐</span>
    <span class="puntaje-texto" id="puntaje">0</span>
  </div>
</div>

<!-- Consigna del nivel -->
<div class="consigna-panel">
  <div class="consigna-card" id="consignaCard">¡Tocá cualquier burbuja! 🫧</div>
</div>

<!-- Poli el pulpo -->
<div class="poli-panel" id="poliPanel">
  <span class="poli-emoji">🐙</span>
  <div class="poli-burbuja-texto" id="poliTexto">¡Hola! Soy Poli. ¡Tocá las burbujas!</div>
</div>

<!-- Celebración -->
<div class="celebracion-overlay" id="celebracion">
  <div class="celebracion-card">
    <div class="cel-emoji" id="celEmoji">🎉</div>
    <div class="cel-titulo" id="celTitulo">¡Genial!</div>
    <div class="cel-xp" id="celXP">+10 XP ⚡</div>
    <div class="cel-sub" id="celSub">¡Seguís sumando!</div>
    <button class="btn-cel" onclick="cerrarCelebracion()">¡Seguir jugando! 🚀</button>
    <button class="btn-cel" style="background: #eee; color: #888; margin-top: -8px;" onclick="salir()">Volver al inicio</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // =============================================
  // CONFIGURACIÓN POR NIVEL
  // =============================================
  const CONFIG_NIVEL = {
    1: {
      consigna: '¡Tocá cualquier burbuja! 🫧',
      descripcion: 'Explotar cualquier burbuja',
      burbujasPorRonda: 5,
      velocidad: 12,        // segundos en subir
      tamano: { min: 70, max: 110 },
      colores: null,        // todas
      colorObjetivo: null,
      xpPorBurbuja: 5,
      mensajesPoli: [
        '¡Bien! 🎉', '¡Genial! ⭐', '¡Eso es! 🌟',
        '¡Sí! ¡Así! 🐙', '¡Qué bueno! ✨'
      ],
      introduccion: '¡Hola! Soy Poli 🐙 ¡Tocá las burbujas!'
    },
    2: {
      consigna: '¡Explotá la burbuja ROJA! 🔴',
      descripcion: 'Solo explotar la burbuja roja',
      burbujasPorRonda: 6,
      velocidad: 10,
      tamano: { min: 65, max: 95 },
      colores: null,
      colorObjetivo: 'rojo',
      xpPorBurbuja: 8,
      mensajesPoli: [
        '¡Rojo! 🔴 ¡Muy bien!', '¡Eso es! ¡El rojo! 🎯',
        '¡Genial! 🌟', '¡Sí! ¡El rojo! 🐙'
      ],
      introduccion: '¡Hola! Soy Poli 🐙 ¡Tocá solo la burbuja ROJA!'
    },
    3: {
      consigna: '¡Tocá el rojo cuando escuches "rojo"! 🔴🔊',
      descripcion: 'Explotar el rojo solo cuando se dice rojo',
      burbujasPorRonda: 7,
      velocidad: 8,
      tamano: { min: 55, max: 85 },
      colores: null,
      colorObjetivo: 'rojo',
      xpPorBurbuja: 12,
      mensajesPoli: [
        '¡Escuchaste "rojo"! 🔴 ¡Genial!', '¡Bravo! 🌟',
        '¡Sos muy listo! 🐙', '¡Increíble! ⭐'
      ],
      introduccion: '¡Hola! Soy Poli 🐙 ¡Tocá el ROJO solo cuando yo diga "rojo"!'
    }
  };

  const COLORES_BURBUJAS = [
    { nombre: 'rojo',     hex: '#FF4444', sombra: '#FF000066' },
    { nombre: 'azul',     hex: '#5BBFEA', sombra: '#5BBFEA66' },
    { nombre: 'verde',    hex: '#52D9A0', sombra: '#52D9A066' },
    { nombre: 'amarillo', hex: '#FFCC3B', sombra: '#FFCC3B66' },
    { nombre: 'violeta',  hex: '#A78BFA', sombra: '#A78BFA66' },
    { nombre: 'naranja',  hex: '#FF7E6B', sombra: '#FF7E6B66' },
  ];

  // =============================================
  // ESTADO
  // =============================================
  let hijo = null;
  let nivelActual = 1;
  let config = null;
  let puntaje = 0;
  let burbujasTocadas = 0;
  let burbujaCorrectas = 0;
  let intervaloBurbujas = null;
  let burbujasEnPantalla = [];
  let juegoActivo = false;
  let colorAnunciado = null;

  // =============================================
  // INICIO
  // =============================================
  window.addEventListener('load', () => {
    // Estrellas de fondo
    crearEstrellas();

    const hijoData = sessionStorage.getItem('hijoActual');
    if (!hijoData) { window.location.href = 'perfiles.html'; return; }
    hijo = JSON.parse(hijoData);
    puntaje = hijo.xp_total || 0;
    nivelActual = hijo.nivel || 1;
    config = CONFIG_NIVEL[nivelActual] || CONFIG_NIVEL[1];

    // Mostrar consigna
    document.getElementById('consignaCard').innerHTML = config.consigna;
    document.getElementById('puntaje').textContent = puntaje;

    // Poli saluda con voz
    setTimeout(() => {
      mostrarPoli(config.introduccion);
      hablar(config.introduccion);
      setTimeout(() => {
        iniciarJuego();
      }, 3000);
    }, 600);
  });

  // =============================================
  // ESTRELLAS DE FONDO
  // =============================================
  function crearEstrellas() {
    const fondo = document.getElementById('fondo');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'estrella-fondo';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `
        width: ${size}px; height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --dur: ${Math.random() * 4 + 2}s;
        --op: ${Math.random() * 0.6 + 0.2};
        animation-delay: ${Math.random() * 4}s;
      `;
      fondo.appendChild(s);
    }
  }

  // =============================================
  // JUEGO
  // =============================================
  function iniciarJuego() {
    juegoActivo = true;
    burbujasEnPantalla = [];
    burbujasTocadas = 0;
    burbujaCorrectas = 0;

    // Para nivel 3, anunciar color periódicamente
    if (nivelActual === 3) {
      anunciarColor();
    }

    // Crear burbujas
    crearBurbuja();
    intervaloBurbujas = setInterval(() => {
      if (juegoActivo && burbujasEnPantalla.length < 6) {
        crearBurbuja();
      }
    }, 1800);
  }

  function crearBurbuja() {
    const area = document.getElementById('areaJuego');
    const colorData = COLORES_BURBUJAS[Math.floor(Math.random() * COLORES_BURBUJAS.length)];
    const tamano = Math.floor(Math.random() * (config.tamano.max - config.tamano.min) + config.tamano.min);
    const duracion = config.velocidad + Math.random() * 4;
    const drift = (Math.random() - 0.5) * 80;
    const posX = Math.random() * (window.innerWidth - tamano);
    const posY = window.innerHeight + tamano;

    const burbuja = document.createElement('div');
    burbuja.className = 'burbuja';
    burbuja.dataset.color = colorData.nombre;
    burbuja.style.cssText = `
      width: ${tamano}px; height: ${tamano}px;
      left: ${posX}px; top: ${posY}px;
      background: radial-gradient(circle at 35% 35%, ${colorData.hex}dd, ${colorData.hex}88);
      box-shadow: 0 0 20px ${colorData.sombra}, inset -4px -4px 12px rgba(0,0,0,0.15), inset 2px 2px 8px rgba(255,255,255,0.4);
      --drift: ${drift}px;
      animation-duration: ${duracion}s;
    `;

    // Para nivel 1 mostrar emojis en burbujas
    if (nivelActual === 1) {
      const emojis = ['🌟','⭐','✨','💫','🎈','🌈'];
      burbuja.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    }

    burbuja.addEventListener('click', () => tocarBurbuja(burbuja, colorData));
    burbuja.addEventListener('touchstart', (e) => { e.preventDefault(); tocarBurbuja(burbuja, colorData); }, { passive: false });

    area.appendChild(burbuja);
    burbujasEnPantalla.push(burbuja);

    // Remover cuando termina animación
    burbuja.addEventListener('animationend', () => {
      burbuja.remove();
      burbujasEnPantalla = burbujasEnPantalla.filter(b => b !== burbuja);
    });
  }

  function tocarBurbuja(burbuja, colorData) {
    if (!juegoActivo) return;

    const esCorrecta = esRespuestaCorrecta(colorData.nombre);

    // Explotar visualmente
    explotar(burbuja, colorData.hex, esCorrecta);
    burbuja.remove();
    burbujasEnPantalla = burbujasEnPantalla.filter(b => b !== burbuja);
    burbujasTocadas++;

    if (esCorrecta) {
      burbujaCorrectas++;
      puntaje += config.xpPorBurbuja;
      document.getElementById('puntaje').textContent = puntaje;

      // Mensaje de Poli
      const msg = config.mensajesPoli[Math.floor(Math.random() * config.mensajesPoli.length)];
      mostrarPoli(msg);
      hablar(msg);

      // Celebración cada 5 correctas
      if (burbujaCorrectas % 5 === 0) {
        setTimeout(() => mostrarCelebracion(), 500);
      }
    } else if (nivelActual > 1) {
      // Error en nivel 2 o 3
      hablar('¡Esa no! Buscá la ' + (config.colorObjetivo === 'rojo' ? 'roja' : config.colorObjetivo));
      mostrarPoli('¡Esa no! Buscá la ' + (nivelActual === 3 && colorAnunciado ? colorAnunciado : 'roja') + ' 🔴');
    }
  }

  function esRespuestaCorrecta(colorNombre) {
    if (nivelActual === 1) return true;
    if (nivelActual === 2) return colorNombre === 'rojo';
    if (nivelActual === 3) return colorNombre === colorAnunciado;
    return true;
  }

  // Nivel 3: anunciar color cada cierto tiempo
  function anunciarColor() {
    const colores = ['rojo', 'azul', 'verde', 'amarillo'];
    colorAnunciado = colores[Math.floor(Math.random() * colores.length)];
    const textos = { rojo: '🔴 ¡Rojo!', azul: '🔵 ¡Azul!', verde: '🟢 ¡Verde!', amarillo: '🟡 ¡Amarillo!' };
    mostrarPoli(textos[colorAnunciado]);
    hablar(colorAnunciado);
    // Actualizar consigna
    document.getElementById('consignaCard').textContent = '¡Tocá la ' + colorAnunciado + '! 🔊';
    setTimeout(() => anunciarColor(), 5000);
  }

  // =============================================
  // EXPLOSIÓN
  // =============================================
  function explotar(burbuja, color, correcto) {
    const rect = burbuja.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const area = document.getElementById('areaJuego');

    // Círculo de explosión
    const exp = document.createElement('div');
    exp.className = 'explosion';
    exp.style.cssText = `
      left: ${cx - 20}px; top: ${cy - 20}px;
      width: 40px; height: 40px; border-radius: 50%;
      background: ${correcto ? color : '#ffffff'};
      opacity: 0.8;
    `;
    area.appendChild(exp);
    setTimeout(() => exp.remove(), 700);

    // Partículas
    const cant = correcto ? 12 : 6;
    for (let i = 0; i < cant; i++) {
      const p = document.createElement('div');
      p.className = 'particula';
      const angulo = (i / cant) * Math.PI * 2;
      const dist = 60 + Math.random() * 60;
      const dx = Math.cos(angulo) * dist;
      const dy = Math.sin(angulo) * dist;
      const size = Math.random() * 12 + 6;
      const particColors = correcto
        ? ['#FFCC3B','#52D9A0','#5BBFEA','#A78BFA','#FF7E6B', color]
        : ['#ffffff88'];
      p.style.cssText = `
        left: ${cx - size/2}px; top: ${cy - size/2}px;
        width: ${size}px; height: ${size}px;
        background: ${particColors[Math.floor(Math.random() * particColors.length)]};
        --dx: ${dx}px; --dy: ${dy}px;
      `;
      area.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    // Sonido simulado con oscilador
    reproducirSonido(correcto);
  }

  // =============================================
  // AUDIO
  // =============================================
  function hablar(texto) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'es-AR';
      msg.rate = 0.85;
      msg.pitch = 1.3;
      window.speechSynthesis.speak(msg);
    }
  }

  function reproducirSonido(correcto) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (correcto) {
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      } else {
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.setValueAtTime(250, ctx.currentTime + 0.1);
      }
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  // =============================================
  // POLI
  // =============================================
  function mostrarPoli(texto) {
    document.getElementById('poliTexto').textContent = texto;
  }

  // =============================================
  // CELEBRACIÓN
  // =============================================
  function mostrarCelebracion() {
    juegoActivo = false;
    clearInterval(intervaloBurbujas);

    const xpGanado = burbujaCorrectas * config.xpPorBurbuja;
    document.getElementById('celEmoji').textContent = '🎉';
    document.getElementById('celTitulo').textContent = '¡' + burbujaCorrectas + ' burbujas! ¡Genial!';
    document.getElementById('celXP').textContent = '+' + xpGanado + ' XP ⚡';
    document.getElementById('celSub').textContent = '¡Poli está muy orgulloso de vos! 🐙';
    document.getElementById('celebracion').style.display = 'flex';

    lanzarConfeti();
    hablar('¡Genial! ¡Explotaste ' + burbujaCorrectas + ' burbujas! ¡Poli está muy orgulloso!');

    // Guardar XP
    guardarProgreso(xpGanado);
  }

  function cerrarCelebracion() {
    document.getElementById('celebracion').style.display = 'none';
    burbujaCorrectas = 0;
    burbujasTocadas = 0;
    juegoActivo = true;
    intervaloBurbujas = setInterval(() => {
      if (juegoActivo && burbujasEnPantalla.length < 6) crearBurbuja();
    }, 1800);
    mostrarPoli('¡Seguimos! 🐙');
    hablar('¡Seguimos jugando!');
  }

  async function guardarProgreso(xpGanado) {
    try {
      const nuevoXP = puntaje;
      const nuevoNivel = nuevoXP >= 150 ? 3 : nuevoXP >= 50 ? 2 : 1;
      await sb.from('children').update({ xp_total: nuevoXP, nivel: nuevoNivel }).eq('id', hijo.id);
      hijo.xp_total = nuevoXP;
      sessionStorage.setItem('hijoActual', JSON.stringify(hijo));
    } catch(e) { console.log('Error guardando:', e); }
  }

  function lanzarConfeti() {
    const confeti = document.getElementById('confeti');
    confeti.style.display = 'block';
    confeti.innerHTML = '';
    const colores = ['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'confeti-pieza';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-10px';
      p.style.background = colores[Math.floor(Math.random() * colores.length)];
      p.style.animationDelay = Math.random() * 1 + 's';
      p.style.width = (Math.random() * 10 + 6) + 'px';
      p.style.height = (Math.random() * 10 + 6) + 'px';
      confeti.appendChild(p);
    }
    setTimeout(() => { confeti.style.display = 'none'; confeti.innerHTML = ''; }, 2500);
  }

  function salir() {
    juegoActivo = false;
    clearInterval(intervaloBurbujas);
    window.speechSynthesis.cancel();
    window.location.href = 'bienvenida.html';
  }
</script>
</body>
</html>
