<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEAbrazo — Burbujas Mágicas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#0a1628;font-family:'Nunito',sans-serif;width:100vw;height:100vh;height:100dvh;overflow:hidden;position:relative;}
  .fondo{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a2a5e 0%,#0a1628 60%);z-index:0;}
  .estrella-fondo{position:absolute;border-radius:50%;background:white;opacity:0;animation:titilar var(--dur) ease-in-out infinite;}
  @keyframes titilar{0%,100%{opacity:0}50%{opacity:var(--op)}}

  .header-juego{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,#0a1628ee 0%,transparent 100%);}
  .btn-salir-juego{background:#ffffff22;border:2px solid #ffffff33;border-radius:14px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:white;cursor:pointer;}
  .puntaje-wrap{display:flex;align-items:center;gap:6px;background:#ffffff22;border:2px solid #ffffff33;border-radius:50px;padding:6px 14px;}
  .puntaje-texto{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:#FFCC3B;}

  /* Timer visible */
  .timer-wrap{background:#ffffff22;border:2px solid #ffffff33;border-radius:50px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:white;display:none;}
  .timer-wrap.urgente{color:#FF7E6B;border-color:#FF7E6B55;animation:pulsar-timer 1s ease-in-out infinite;}
  @keyframes pulsar-timer{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  .consigna-panel{position:fixed;top:60px;left:0;right:0;z-index:100;display:flex;justify-content:center;padding:0 16px;}
  .consigna-card{background:#ffffff22;backdrop-filter:blur(12px);border:2px solid #ffffff33;border-radius:20px;padding:10px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(14px,4vw,18px);color:white;text-align:center;display:flex;align-items:center;gap:8px;justify-content:center;}
  .consigna-circulo{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);display:none;}

  .area-juego{position:fixed;inset:0;z-index:10;}

  .burbuja{position:absolute;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;user-select:none;touch-action:manipulation;animation:subir linear forwards;}
  .burbuja::before{content:'';position:absolute;top:12%;left:18%;width:32%;height:20%;background:rgba(255,255,255,0.55);border-radius:50%;transform:rotate(-30deg);}
  @keyframes subir{0%{transform:translateY(0) translateX(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(calc(-100vh - 120px)) translateX(var(--drift));opacity:0}}

  .particula{position:absolute;border-radius:50%;animation:volar 0.7s ease forwards;pointer-events:none;}
  @keyframes volar{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
  .anillo{position:absolute;border-radius:50%;pointer-events:none;z-index:51;animation:anillo 0.5s ease forwards;}
  @keyframes anillo{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}

  .pupi-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:flex-end;padding:0 16px 16px;gap:10px;pointer-events:none;}
  .pupi-emoji{font-size:clamp(40px,12vw,56px);animation:pupi-bounce 2s ease-in-out infinite;filter:drop-shadow(0 4px 12px #00000044);flex-shrink:0;}
  @keyframes pupi-bounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  .pupi-texto{background:white;border-radius:20px 20px 20px 4px;padding:12px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(13px,4vw,16px);color:#333;max-width:230px;box-shadow:0 4px 20px #00000033;line-height:1.4;}

  /* CUENTA REGRESIVA */
  .countdown-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:radial-gradient(ellipse at center,#1a2a5ecc,#0a1628ee);}
  .countdown-numero{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(120px,35vw,200px);color:white;animation:numero-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);text-shadow:0 0 60px currentColor;line-height:1;}
  .countdown-ya{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(60px,20vw,100px);color:#FFCC3B;animation:numero-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);text-shadow:0 0 40px #FFCC3B;}
  @keyframes numero-pop{from{transform:scale(0.2) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
  .countdown-pupi{font-size:clamp(60px,18vw,90px);animation:pupi-bounce 1s ease-in-out infinite;}

  /* CELEBRACIÓN */
  .celebracion-overlay{position:fixed;inset:0;background:#00000066;z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
  .celebracion-card{background:white;border-radius:32px;padding:36px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:340px;animation:pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop-in{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
  .cel-emoji{font-size:64px;}
  .cel-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(24px,7vw,30px);color:#333;text-align:center;}
  .cel-xp{background:linear-gradient(135deg,#FFCC3B,#FF7E6B);border-radius:50px;padding:10px 24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:white;}
  .btn-cel{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:20px;padding:16px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:white;cursor:pointer;}
  .btn-cel:active{transform:scale(0.97);}
  .btn-cel-sec{background:#F0F7FF;border:none;border-radius:16px;padding:12px;width:100%;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:#888;cursor:pointer;}

  /* FIN DE TIEMPO */
  .fin-overlay{position:fixed;inset:0;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:28px;background:linear-gradient(135deg,#5BBFEA,#A78BFA);}
  .fin-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(48px,15vw,80px);color:white;text-align:center;text-shadow:0 4px 20px #00000033;animation:flotar-fin 3s ease-in-out infinite;}
  @keyframes flotar-fin{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .fin-sub{font-family:'Nunito',sans-serif;font-weight:700;font-size:18px;color:rgba(255,255,255,0.85);text-align:center;}
  .fin-pupi{font-size:80px;animation:pupi-bounce 2s ease-in-out infinite;}
  .fin-pin-wrap{background:white;border-radius:24px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:320px;box-shadow:0 8px 32px #00000033;}
  .fin-pin-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:#555;text-align:center;}
  .fin-pin-input{display:flex;gap:10px;justify-content:center;}
  .fin-pin-digito{width:56px;height:64px;border:3px solid #E0EFFF;border-radius:16px;background:#F0F7FF;text-align:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:#333;outline:none;}
  .fin-pin-digito:focus{border-color:#5BBFEA;}
  .fin-pin-error{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#FF7E6B;display:none;}
  .btn-fin-desbloquear{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:18px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:white;cursor:pointer;}

  .confeti{position:fixed;inset:0;pointer-events:none;z-index:600;display:none;}
  .confeti-pieza{position:absolute;border-radius:2px;animation:caer 1.8s ease-in forwards;}
  @keyframes caer{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="fondo" id="fondo"></div>
<div class="confeti" id="confeti"></div>
<div class="area-juego" id="areaJuego"></div>

<div class="header-juego">
  <button class="btn-salir-juego" onclick="salir()">← Salir</button>
  <div class="timer-wrap" id="timerWrap">⏱️ <span id="timerTexto">--:--</span></div>
  <div class="puntaje-wrap">⭐ <span class="puntaje-texto" id="puntaje">0</span></div>
</div>

<div class="consigna-panel">
  <div class="consigna-card" id="consignaCard">
    <div class="consigna-circulo" id="consignaCiruclo"></div>
    <span id="consignaTexto">¡Tocá cualquier burbuja! 💦</span>
  </div>
</div>

<div class="pupi-panel">
  <span class="pupi-emoji">🐙</span>
  <div class="pupi-texto" id="pupiTexto">¡Hola! Soy Pupi 🐙</div>
</div>

<!-- Cuenta regresiva -->

<!-- Intro instrucciones -->
<div id="introOverlay" style="position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:linear-gradient(135deg,#0d0d2b,#1a1a4e);">
  <div id="introEmoji" style="font-size:clamp(72px,20vw,110px);animation:intro-bounce 1s ease-in-out infinite;filter:drop-shadow(0 8px 24px #5BBFEA44);"></div>
  <div id="introTitulo" style="font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(22px,6vw,32px);color:white;text-align:center;text-shadow:0 2px 12px #00000055;"></div>
  <div style="display:flex;align-items:flex-end;gap:12px;max-width:360px;width:100%;">
    <div style="font-size:clamp(44px,12vw,64px);animation:pupi-intro 2s ease-in-out infinite;filter:drop-shadow(0 4px 12px #00000066);flex-shrink:0;">🐙</div>
    <div id="introTexto" style="background:white;border-radius:20px 20px 20px 4px;padding:14px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(15px,4.5vw,19px);color:#333;box-shadow:0 4px 20px #00000033;line-height:1.4;flex:1;"></div>
  </div>
  <button onclick="cerrarIntro()" style="background:linear-gradient(135deg,#52D9A0,#5BBFEA);border:none;border-radius:28px;padding:20px 0;width:100%;max-width:320px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,6vw,26px);color:white;cursor:pointer;box-shadow:0 8px 24px #52D9A044;animation:btn-llamar 2s ease-in-out infinite;letter-spacing:1px;">¡Listo! 🚀</button>
</div>
<style>
  @keyframes intro-bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
  @keyframes pupi-intro{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  @keyframes btn-llamar{0%,100%{transform:scale(1);box-shadow:0 8px 24px #52D9A044}50%{transform:scale(1.03);box-shadow:0 12px 32px #52D9A066}}
</style>

<div class="countdown-overlay" id="countdownOverlay">
  <div class="countdown-pupi">🐙</div>
  <div id="countdownNumero" class="countdown-numero">3</div>
</div>

<!-- Celebración -->
<div class="celebracion-overlay" id="celebracion">
  <div class="celebracion-card">
    <div class="cel-emoji">🎉</div>
    <div class="cel-titulo" id="celTitulo">¡EXCELENTE!</div>
    <div class="cel-xp" id="celXP">+10 XP ⚡</div>
    <button class="btn-cel" onclick="cerrarCelebracion()">¡Seguir jugando! 🚀</button>
    <button class="btn-cel-sec" onclick="salir()">Volver al inicio</button>
  </div>
</div>

<!-- Fin de tiempo -->
<div class="fin-overlay" id="finOverlay">
  <div class="fin-pupi">🐙</div>
  <div class="fin-titulo">¡GRACIAS!</div>
  <div class="fin-sub">¡Jugaste genial hoy! 🌟<br>Hasta la próxima.</div>
  <div class="fin-pin-wrap">
    <div class="fin-pin-label">🔐 Ingresá el PIN para salir</div>
    <div class="fin-pin-input">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p1" oninput="avanzarPin(this,'p2')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p2" oninput="avanzarPin(this,'p3')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p3" oninput="avanzarPin(this,'p4')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p4" oninput="verificarPin()">
    </div>
    <div class="fin-pin-error" id="pinError">❌ PIN incorrecto. Intentá de nuevo.</div>
    <button class="btn-fin-desbloquear" onclick="verificarPin()">Desbloquear 🔓</button>
  </div>
</div>

<script>
  const SUPABASE_URL='https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const {createClient}=supabase;
  const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

  // =============================================
  // SISTEMA DE NIVELES POR JUEGO
  // Flexible para N niveles futuros
  // =============================================
  const JUEGO_ID = 'burbujas';
  const NIVEL_MAXIMO_JUEGO = 3;
  const RACHA_PARA_SUBIR = 3;
  const RACHA_PARA_BAJAR = 3;
  const UMBRAL_EXITO = 0.6;

  let progresoJuego = {nivel:1, racha_ok:0, racha_fail:0};

  async function cargarProgresoJuego(){
    if(!hijo)return;
    try{
      const {data,error}=await sb.from('game_progress').select('*').eq('hijo_id',hijo.id).eq('juego',JUEGO_ID).single();
      if(data&&!error){
        progresoJuego=data;
        nivelActual=data.nivel;
      }else{
        // Tabla no existe o sin registro: usar nivel del hijo
        nivelActual=hijo.nivel||1;
        // Intentar crear el registro, pero si falla no bloqueamos
        try{
          await sb.from('game_progress').insert({hijo_id:hijo.id,juego:JUEGO_ID,nivel:nivelActual,racha_ok:0,racha_fail:0,nivel_maximo:NIVEL_MAXIMO_JUEGO});
        }catch(e2){}
      }
    }catch(e){
      // Si falla cualquier cosa, usar nivel del hijo sin bloquear
      nivelActual=hijo.nivel||1;
    }finally{
      actualizarUIDeNivel();
    }
  }

  async function registrarResultadoPartida(aciertos,total){
    const exito=total>0?aciertos/total:0;
    const buena=exito>=UMBRAL_EXITO;
    if(buena){progresoJuego.racha_ok++;progresoJuego.racha_fail=0;}
    else{progresoJuego.racha_fail++;progresoJuego.racha_ok=0;}
    let cambio=null;
    const nivelMax=progresoJuego.nivel_maximo||NIVEL_MAXIMO_JUEGO;
    if(progresoJuego.racha_ok>=RACHA_PARA_SUBIR&&nivelActual<nivelMax){
      nivelActual++;progresoJuego.nivel=nivelActual;progresoJuego.racha_ok=0;cambio='subio';
    }
    if(progresoJuego.racha_fail>=RACHA_PARA_BAJAR&&nivelActual>1){
      nivelActual--;progresoJuego.nivel=nivelActual;progresoJuego.racha_fail=0;cambio='bajo';
    }
    try{
      await sb.from('game_progress').upsert({
        hijo_id:hijo.id,juego:JUEGO_ID,nivel:nivelActual,
        racha_ok:progresoJuego.racha_ok,racha_fail:progresoJuego.racha_fail,
        nivel_maximo:nivelMax,actualizado_at:new Date().toISOString(),
      },{onConflict:'hijo_id,juego'});
    }catch(e){}
    actualizarUIDeNivel();
    if(cambio)mostrarCambioDeNivel(cambio);
  }

  function actualizarUIDeNivel(){
    if(typeof NIVELES_CONFIG==='undefined')return;
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    const em=document.getElementById('nivelEmoji');const nm=document.getElementById('nivelNombre');
    if(em)em.textContent=nc.emoji;if(nm)nm.textContent=nc.nombre;
    actualizarEstrellas();
  }

  function actualizarEstrellas(){
    if(typeof NIVELES_CONFIG==='undefined')return;
    let el=document.getElementById('rachaStars');
    if(!el){
      el=document.createElement('div');el.id='rachaStars';
      el.style.cssText='font-size:11px;letter-spacing:1px;';
      const nm=document.getElementById('nivelNombre');
      if(nm&&nm.parentNode)nm.parentNode.appendChild(el);
    }
    const llenas=progresoJuego.racha_ok||0;
    let h='';for(let i=0;i<RACHA_PARA_SUBIR;i++)h+=i<llenas?'⭐':'·';
    el.textContent=h;
  }

  function mostrarCambioDeNivel(tipo){
    const msg=tipo==='subio'?'🎉 ¡Nivel '+nivelActual+'!':'💪 Nivel '+nivelActual;
    const n=document.createElement('div');
    n.style.cssText='position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:800;background:white;border-radius:20px;padding:10px 20px;font-family:Nunito,sans-serif;font-weight:900;font-size:16px;color:#333;box-shadow:0 6px 24px #00000022;white-space:nowrap;animation:npop 0.4s ease;';
    n.textContent=msg;document.body.appendChild(n);
    if(!document.getElementById('npop-style')){const s=document.createElement('style');s.id='npop-style';s.textContent='@keyframes npop{from{opacity:0;transform:translateX(-50%) scale(0.7)}to{opacity:1;transform:translateX(-50%) scale(1)}}';document.head.appendChild(s);}
    setTimeout(()=>n.remove(),2800);
    if(typeof _hablar==='function')_hablar(msg.replace(/[🎉💪]/g,''),1.0);
  }


  // Respeta silencio global
  function appEstaSilenciada(){return localStorage.getItem('teabrazo_muted')==='1';}

  function _hablar(texto,rate=1.0){
    if(appEstaSilenciada()){return;}
    if(!('speechSynthesis' in window))return;
    window.speechSynthesis.cancel();
    const msg=new SpeechSynthesisUtterance(texto);
    msg.lang='es-AR';msg.rate=rate;msg.pitch=1.8;
    window.speechSynthesis.speak(msg);
  }


  const COLORES=[
    {nombre:'rojo',    hex:'#EE1111',sombra:'#EE111166',borde:'#FF5555'},
    {nombre:'amarillo',hex:'#FFCC3B',sombra:'#FFCC3B66',borde:'#FFE07A'},
    {nombre:'verde',   hex:'#27C96A',sombra:'#27C96A66',borde:'#5DEEA0'},
    {nombre:'azul',    hex:'#2B7FFF',sombra:'#2B7FFF66',borde:'#6AABFF'},
    {nombre:'violeta', hex:'#A78BFA',sombra:'#A78BFA66',borde:'#C4B0FF'},
    {nombre:'blanco',  hex:'#EEEEEE',sombra:'#CCCCCC66',borde:'#FFFFFF'},
  ];


  // =============================================
  // INTRO DE INSTRUCCIONES
  // =============================================
  const INSTRUCCIONES_JUEGO={
    1: "¡Tocá cualquier burbuja que veas!",
    2: "¡Tocá solo las burbujas del color que te pido!",
    3: "¡Escuchá qué color pido y tocá esa burbuja!",
  };

  function mostrarIntro(onDone){
    const overlay=document.getElementById('introOverlay');
    if(!overlay){onDone();return;}
    // Setear contenido
    const emojiEl=document.getElementById('introEmoji');
    const tituloEl=document.getElementById('introTitulo');
    const textoEl=document.getElementById('introTexto');
    if(emojiEl)emojiEl.textContent='💦';
    if(tituloEl)tituloEl.textContent='¡Burbujas mágicas!';
    const texto=INSTRUCCIONES_JUEGO[nivelActual]||INSTRUCCIONES_JUEGO[1];
    if(textoEl)textoEl.textContent=texto;
    // Mostrar overlay
    overlay.style.display='flex';
    // Guardar callback
    window._introDone=onDone;
    // Narrar con delay para que el navegador pinte primero
    setTimeout(()=>_hablar(texto,1.0),600);
  }

  function cerrarIntro(){
    const overlay=document.getElementById('introOverlay');
    if(overlay)overlay.style.display='none';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    if(window._introDone)window._introDone();
  }

  // =============================================
  // AUDIO — usa voz grabada si existe, sino MP3
  // =============================================
  let vocesGrabadas={};
  try{ vocesGrabadas=JSON.parse(localStorage.getItem('voces_teabrazo')||'{}'); }catch(e){}

  let audioActual=null;
  let audioQueue=[];
  let reproduciendo=false;

  function reproducir(id, forzar=true){
    // forzar=true interrumpe el audio actual (para respuestas inmediatas)
    // forzar=false encola (para secuencias)
    if(forzar){
      audioQueue=[];
      reproduciendo=false;
      if(audioActual){audioActual.pause();audioActual.currentTime=0;}
      _reproducirAhora(id);
    } else {
      audioQueue.push(id);
      if(!reproduciendo)_procesarCola();
    }
  }

  function _reproducirAhora(id){
    if(appEstaSilenciada()){reproduciendo=false;_procesarCola();return;}
    try{
      const src=vocesGrabadas[id]||('audio/'+id+'.mp3');
      audioActual=new Audio(src);
      reproduciendo=true;
      audioActual.onended=()=>{reproduciendo=false;_procesarCola();};
      audioActual.onerror=()=>{reproduciendo=false;_procesarCola();};
      audioActual.play().catch(()=>{reproduciendo=false;_procesarCola();});
    }catch(e){reproduciendo=false;}
  }

  function _procesarCola(){
    if(audioQueue.length>0&&!reproduciendo){
      _reproducirAhora(audioQueue.shift());
    }
  }

  function sonidoBurbuja(correcto){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      const src=ctx.createBufferSource();src.buffer=buf;
      const filt=ctx.createBiquadFilter();filt.type='bandpass';
      filt.frequency.value=correcto?1800:400;filt.Q.value=8;
      const gain=ctx.createGain();
      gain.gain.setValueAtTime(correcto?0.35:0.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
      src.connect(filt);filt.connect(gain);gain.connect(ctx.destination);src.start();
    }catch(e){}
  }

  // =============================================
  // ESTADO
  // =============================================
  let hijo=null, nivelActual=1, puntaje=0;
  let burbujaCorrectas=0, intervaloBurbujas=null;
  let burbujasEnPantalla=[], juegoActivo=false;
  let colorFijoNivel2=null, colorPedidoNivel3=null, timeoutNivel3=null;

  // Tiempo límite
  let tiempoLimiteSegundos=0;
  let tiempoRestante=0;
  let intervaloTimer=null;

  // =============================================
  // INICIO
  // =============================================
  window.addEventListener('load',()=>{
    crearEstrellas();
    const hijoData=sessionStorage.getItem('hijoActual');
    if(!hijoData){window.location.href='perfiles.html';return;}
    hijo=JSON.parse(hijoData);
    puntaje=hijo.xp_total||0;
    nivelActual=1; // se sobreescribe con cargarProgresoJuego()
    document.getElementById('puntaje').textContent=puntaje;

    // Configurar tiempo límite
    if(hijo.tiempo_limite&&hijo.tiempo_limite>0){
      tiempoLimiteSegundos=hijo.tiempo_limite*60;
      tiempoRestante=tiempoLimiteSegundos;
      document.getElementById('timerWrap').style.display='flex';
      actualizarTimerDisplay();
    }

    cargarProgresoJuego().then(()=>{
      mostrarIntro(()=>setTimeout(()=>mostrarCountdown(),300));
    }).catch(()=>{
      // Si falla todo, arrancar igual
      nivelActual=hijo.nivel||1;
      actualizarUIDeNivel();
      mostrarIntro(()=>setTimeout(()=>mostrarCountdown(),300));
    });
  });

  // =============================================
  // CUENTA REGRESIVA
  // =============================================
  function mostrarCountdown(){
    const overlay=document.getElementById('countdownOverlay');
    const numEl=document.getElementById('countdownNumero');
    overlay.style.display='flex';

    const pasos=[
      {texto:'3',color:'#FF7E6B',audio:'tres'},
      {texto:'2',color:'#FFCC3B',audio:'dos'},
      {texto:'1',color:'#52D9A0',audio:'uno'},
      {texto:'¡YA!',color:'#FFCC3B',audio:'ya',esYa:true},
    ];

    let i=0;
    function siguiente(){
      if(i>=pasos.length){
        overlay.style.display='none';
        configurarNivelYArrancar();
        return;
      }
      const paso=pasos[i];
      numEl.className=paso.esYa?'countdown-ya':'countdown-numero';
      numEl.style.color=paso.color;
      numEl.textContent=paso.texto;
      // Forzar re-animación
      numEl.style.animation='none';
      numEl.offsetHeight;
      numEl.style.animation='';
      reproducir(paso.audio);
      i++;
      setTimeout(siguiente,900);
    }
    siguiente();
  }

  // =============================================
  // CONFIGURAR NIVEL
  // =============================================
  function configurarNivelYArrancar(){
    if(nivelActual===1){
      setConsigna('¡Tocá cualquier burbuja! 💦',null);
      mostrarPupi('¡Tocá cualquier burbuja!');
    }else if(nivelActual===2){
      colorFijoNivel2=COLORES[Math.floor(Math.random()*COLORES.length)];
      setConsigna('¡Tocá la '+colorFijoNivel2.nombre.toUpperCase()+'!',colorFijoNivel2.hex);
      mostrarPupi('¡Tocá la '+colorFijoNivel2.nombre+'!');
      setTimeout(()=>reproducir(colorFijoNivel2.nombre),300);
      setInterval(()=>{if(juegoActivo&&nivelActual===2&&!reproduciendo)reproducir(colorFijoNivel2.nombre,false);},8000);
    }else{
      setConsigna('¡Escuchá a Pupi! 🐙',null);
      setTimeout(()=>pedirNuevoColorNivel3(),800);
    }
    iniciarJuego();
  }

  function pedirNuevoColorNivel3(){
    if(!juegoActivo||nivelActual!==3)return;
    colorPedidoNivel3=COLORES[Math.floor(Math.random()*COLORES.length)];
    setConsigna('¡'+colorPedidoNivel3.nombre.toUpperCase()+'!',colorPedidoNivel3.hex);
    mostrarPupi('¡'+colorPedidoNivel3.nombre.toUpperCase()+'! 🐙');
    reproducir(colorPedidoNivel3.nombre);
    timeoutNivel3=setTimeout(()=>pedirNuevoColorNivel3(),6000);
    setTimeout(()=>crearBurbujaColor(),400);
  }

  function setConsigna(texto,colorHex){
    document.getElementById('consignaTexto').textContent=texto;
    const c=document.getElementById('consignaCiruclo');
    if(colorHex){c.style.display='block';c.style.background=colorHex;c.style.boxShadow='0 0 10px '+colorHex;}
    else c.style.display='none';
  }

  // =============================================
  // TIMER DE TIEMPO LÍMITE
  // =============================================
  function iniciarTimer(){
    if(!tiempoLimiteSegundos)return;
    intervaloTimer=setInterval(()=>{
      tiempoRestante--;
      actualizarTimerDisplay();
      if(tiempoRestante<=60) document.getElementById('timerWrap').classList.add('urgente');
      if(tiempoRestante<=0){
        clearInterval(intervaloTimer);
        detenerJuego();
        mostrarFinDeTiempo();
      }
    },1000);
  }

  function actualizarTimerDisplay(){
    const min=Math.floor(tiempoRestante/60);
    const seg=tiempoRestante%60;
    document.getElementById('timerTexto').textContent=min+':'+(seg<10?'0':'')+seg;
  }

  function mostrarFinDeTiempo(){
    juegoActivo=false;
    clearInterval(intervaloBurbujas);
    clearTimeout(timeoutNivel3);
    // Limpiar burbujas
    document.getElementById('areaJuego').innerHTML='';
    document.getElementById('finOverlay').style.display='flex';
    reproducir('excelente');
  }

  // =============================================
  // PIN
  // =============================================
  function avanzarPin(el,siguienteId){
    if(el.value.length===1){
      const sig=document.getElementById(siguienteId);
      if(sig)sig.focus();
    }
  }

  function verificarPin(){
    const ingresado=[
      document.getElementById('p1').value,
      document.getElementById('p2').value,
      document.getElementById('p3').value,
      document.getElementById('p4').value,
    ].join('');

    const pinCorrecto=hijo.pin?hijo.pin.toString():'';

    if(!pinCorrecto||ingresado===pinCorrecto){
      window.location.href='perfiles.html';
    }else{
      document.getElementById('pinError').style.display='block';
      ['p1','p2','p3','p4'].forEach(id=>{document.getElementById(id).value='';});
      document.getElementById('p1').focus();
    }
  }

  // =============================================
  // JUEGO
  // =============================================
  function iniciarJuego(){
    juegoActivo=true;
    burbujasEnPantalla=[];
    burbujaCorrectas=0;
    crearBurbuja();
    intervaloBurbujas=setInterval(()=>{
      if(juegoActivo&&burbujasEnPantalla.length<10)crearBurbuja();
    },900);
    iniciarTimer();
  }

  function detenerJuego(){
    juegoActivo=false;
    clearInterval(intervaloBurbujas);
    clearInterval(intervaloTimer);
    clearTimeout(timeoutNivel3);
  }

  function crearBurbujaColor(){
    // Crea una burbuja del color pedido para que aparezca rápido
    const colorObjetivo = nivelActual===2 ? colorFijoNivel2 : colorPedidoNivel3;
    if(!colorObjetivo||!juegoActivo)return;
    const tam=tamañoPorNivel();
    const size=Math.floor(Math.random()*(tam.max-tam.min)+tam.min);
    const dur=velocidadPorNivel()+Math.random()*2;
    const drift=(Math.random()-0.5)*100;
    const margen=16;
    const area=document.getElementById('areaJuego');
    const posX=margen+Math.random()*(window.innerWidth-size-margen*2);
    const posY=window.innerHeight+size+10;
    const b=document.createElement('div');
    b.className='burbuja';
    b.dataset.color=colorObjetivo.nombre;
    b.style.cssText=`width:${size}px;height:${size}px;left:${posX}px;top:${posY}px;background:radial-gradient(circle at 35% 30%,${colorObjetivo.borde},${colorObjetivo.hex});box-shadow:0 0 24px ${colorObjetivo.sombra},inset -4px -4px 12px rgba(0,0,0,0.15),inset 2px 2px 8px rgba(255,255,255,0.45);border:2px solid ${colorObjetivo.borde}44;--drift:${drift}px;animation-duration:${dur}s;`;
    b.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();tocarBurbuja(b,colorObjetivo);});
    area.appendChild(b);
    burbujasEnPantalla.push(b);
    b.addEventListener('animationend',()=>{b.remove();burbujasEnPantalla=burbujasEnPantalla.filter(x=>x!==b);});
  }

  function crearBurbuja(){
    const area=document.getElementById('areaJuego');
    const colorData=COLORES[Math.floor(Math.random()*COLORES.length)];
    const tam=nivelActual===1?{min:80,max:120}:nivelActual===2?{min:65,max:100}:{min:55,max:85};
    const size=Math.floor(Math.random()*(tam.max-tam.min)+tam.min);
    const dur=(nivelActual===1?8:nivelActual===2?6:5)+Math.random()*3;
    const drift=(Math.random()-0.5)*100;
    const margen=16;
    const posX=margen+Math.random()*(window.innerWidth-size-margen*2);
    const posY=window.innerHeight+size+10;
    const esOscuro=colorData.nombre==='negro';

    const b=document.createElement('div');
    b.className='burbuja';
    b.dataset.color=colorData.nombre;
    b.style.cssText=`width:${size}px;height:${size}px;left:${posX}px;top:${posY}px;background:radial-gradient(circle at 35% 30%,${colorData.borde},${colorData.hex});box-shadow:0 0 20px ${colorData.sombra},inset -3px -3px 10px rgba(0,0,0,0.25),inset 2px 2px 8px rgba(255,255,255,${esOscuro?'0.12':'0.45'});border:2px solid ${colorData.borde}44;--drift:${drift}px;animation-duration:${dur}s;`;

    if(nivelActual===1){
      const emojis=['🌟','⭐','✨','💫','🎈','🌈'];
      b.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    }

    b.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();tocarBurbuja(b,colorData);});
    area.appendChild(b);
    burbujasEnPantalla.push(b);
    b.addEventListener('animationend',()=>{b.remove();burbujasEnPantalla=burbujasEnPantalla.filter(x=>x!==b);});
  }

  function esCorrecta(colorNombre){
    if(nivelActual===1)return true;
    if(nivelActual===2)return colorFijoNivel2&&colorNombre===colorFijoNivel2.nombre;
    if(nivelActual===3)return colorPedidoNivel3&&colorNombre===colorPedidoNivel3.nombre;
    return true;
  }

  function tocarBurbuja(b,colorData){
    if(!juegoActivo||!b.parentNode)return;
    const correcto=esCorrecta(colorData.nombre);
    const rect=b.getBoundingClientRect();
    explotar(rect,colorData.hex,correcto);
    b.remove();
    burbujasEnPantalla=burbujasEnPantalla.filter(x=>x!==b);
    sonidoBurbuja(correcto);

    if(correcto){
      burbujaCorrectas++;
      puntaje+=(nivelActual===1?5:nivelActual===2?8:12);
      document.getElementById('puntaje').textContent=puntaje;
      const audios=['bien','genial','si','bravo','excelente','que_bien'];
      const audio=audios[Math.floor(Math.random()*audios.length)];
      const textos={bien:'¡BIEN! 🎉',genial:'¡GENIAL! ⭐',si:'¡SÍ! 🌟',bravo:'¡BRAVO! 🎊',excelente:'¡EXCELENTE! 🏆',que_bien:'¡QUÉ BIEN! 💫'};
      mostrarPupi(textos[audio]);
      reproducir(audio);
      if(burbujaCorrectas%5===0)setTimeout(mostrarCelebracion,400);
      if(nivelActual===3){clearTimeout(timeoutNivel3);timeoutNivel3=setTimeout(()=>pedirNuevoColorNivel3(),2000);}
    }else if(nivelActual>1){
      mostrarPupi('¡Esa no! 🙈');
      reproducir('upps');
    }
  }

  function explotar(rect,color,correcto){
    const area=document.getElementById('areaJuego');
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    const size=rect.width;
    const anillo=document.createElement('div');
    anillo.className='anillo';
    anillo.style.cssText=`left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;border:4px solid ${correcto?'#52D9A0':'#FF4444'};`;
    area.appendChild(anillo);
    setTimeout(()=>anillo.remove(),600);
    if(!correcto)return;
    const cols=['#FFCC3B','#52D9A0','#5BBFEA','#A78BFA','#FF7E6B',color];
    for(let i=0;i<16;i++){
      const p=document.createElement('div');p.className='particula';
      const ang=(i/16)*Math.PI*2;const dist=55+Math.random()*70;const s=Math.random()*12+6;
      p.style.cssText=`left:${cx-s/2}px;top:${cy-s/2}px;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;`;
      area.appendChild(p);
      setTimeout(()=>p.remove(),800);
    }
  }

  function mostrarPupi(texto){document.getElementById('pupiTexto').textContent=texto;}

  function mostrarCelebracion(){
    const frases=[{texto:'¡EXCELENTE!',audio:'excelente'},{texto:'¡QUÉ BIEN!',audio:'que_bien'},{texto:'¡INCREÍBLE!',audio:'increible'}];
    const f=frases[Math.floor(Math.random()*frases.length)];
    document.getElementById('celTitulo').textContent=f.texto;
    document.getElementById('celXP').textContent='+'+(burbujaCorrectas*(nivelActual===1?5:nivelActual===2?8:12))+' XP ⚡';
    document.getElementById('celebracion').style.display='flex';
    lanzarConfeti();
    reproducir(f.audio);
    guardarProgreso(rondasCorrectas||partesCorrectas||juegosCorrectos||0, rondasJugadas||partesJugadas||juegosEnRonda||RONDAS_POR_CELEBRACION||5);
  }

  function cerrarCelebracion(){
    document.getElementById('celebracion').style.display='none';
    burbujaCorrectas=0;
    juegoActivo=true;
    if(nivelActual===2){
      colorFijoNivel2=COLORES[Math.floor(Math.random()*COLORES.length)];
      setConsigna('¡'+colorFijoNivel2.nombre.toUpperCase()+'!',colorFijoNivel2.hex);
      setTimeout(()=>reproducir(colorFijoNivel2.nombre),300);
    }
    if(nivelActual===3)setTimeout(()=>pedirNuevoColorNivel3(),500);
    crearBurbuja();
    intervaloBurbujas=setInterval(()=>{if(juegoActivo&&burbujasEnPantalla.length<10)crearBurbuja();},900);
    mostrarPupi('¡Seguimos! 🐙');
    reproducir('seguimos');
  }

  async function guardarProgreso(aciertos=0,total=0){
    await registrarResultadoPartida(aciertos,total);
    try{
      // Solo guardar XP — el nivel lo cambia siempre el padre desde perfiles
      await sb.from('children').update({xp_total:puntaje}).eq('id',hijo.id);
      hijo.xp_total=puntaje;sessionStorage.setItem('hijoActual',JSON.stringify(hijo));
    }catch(e){}
  }

  function lanzarConfeti(){
    const confeti=document.getElementById('confeti');
    confeti.style.display='block';confeti.innerHTML='';
    const cols=['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
    for(let i=0;i<80;i++){
      const p=document.createElement('div');p.className='confeti-pieza';
      p.style.left=Math.random()*100+'vw';p.style.top='-10px';
      p.style.background=cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDelay=Math.random()*1+'s';
      p.style.width=(Math.random()*10+6)+'px';p.style.height=(Math.random()*10+6)+'px';
      confeti.appendChild(p);
    }
    setTimeout(()=>{confeti.style.display='none';confeti.innerHTML='';},2500);
  }

  function crearEstrellas(){
    const fondo=document.getElementById('fondo');
    for(let i=0;i<35;i++){
      const s=document.createElement('div');s.className='estrella-fondo';
      const size=Math.random()*3+1;
      s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--op:${Math.random()*0.5+0.2};animation-delay:${Math.random()*4}s`;
      fondo.appendChild(s);
    }
  }

  function salir(){
    detenerJuego();
    window.location.href='bienvenida.html';
  }
</script>
</body>
</html>
