  #puntosCanvas{

    box-shadow:0 6px 28px #A78BFA22;

    flex-shrink:0;
  }

  .pupi-panel{display:flex;align-items:flex-end;gap:10px;width:100%;flex-shrink:0;}
  .pupi-emoji{font-size:clamp(34px,9vw,46px);animation:pupi-b 2s ease-in-out infinite;flex-shrink:0;}
  @keyframes pupi-b{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}

  @keyframes intro-b{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
  .intro-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(22px,6vw,32px);color:white;text-align:center;}
  .intro-pupi-row{display:flex;align-items:flex-end;gap:12px;max-width:360px;width:100%;}
  .intro-pupi{font-size:clamp(44px,12vw,64px);animation:pupi-intro 2s ease-in-out infinite;flex-shrink:0;}
  @keyframes pupi-intro{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  .intro-texto{background:white;border-radius:20px 20px 20px 4px;padding:14px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(15px,4.5vw,19px);color:#333;line-height:1.4;flex:1;}
  .btn-listo{background:linear-gradient(135deg,#52D9A0,#5BBFEA);border:none;border-radius:28px;padding:20px 0;width:100%;max-width:320px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,6vw,26px);color:white;cursor:pointer;animation:btn-ll 2s ease-in-out infinite;}
  @keyframes btn-ll{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

  .countdown-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#F0F7FFee;}

function appEstaSilenciada(){return localStorage.getItem('teabrazo_muted')==='1';}

// =============================================
// FIGURAS — puntos normalizados 0-1
// =============================================
const FIGURAS=[
  // Nivel 1
  {nombre:'Estrella',   emoji:'⭐', nivel:1, pts:[[.5,.08],[.61,.35],[.9,.35],[.67,.54],[.78,.82],[.5,.65],[.22,.82],[.33,.54],[.1,.35],[.39,.35],[.5,.08]]},

  {nombre:'Corazón',    emoji:'❤️', nivel:1, pts:[[.5,.85],[.1,.38],[.15,.2],[.3,.12],[.5,.25],[.7,.12],[.85,.2],[.9,.38],[.5,.85]]},

  {nombre:'Rayo',       emoji:'⚡', nivel:2, pts:[[.62,.05],[.32,.52],[.55,.52],[.28,.95],[.68,.48],[.45,.48],[.62,.05]]},
  {nombre:'Luna',       emoji:'🌙', nivel:2, pts:[[.7,.1],[.4,.15],[.2,.35],[.15,.55],[.2,.75],[.4,.88],[.7,.92],[.55,.75],[.45,.55],[.55,.32],[.7,.1]]},
  {nombre:'Pez',        emoji:'🐟', nivel:2, pts:[[.12,.5],[.08,.25],[.08,.75],[.12,.5],[.38,.32],[.72,.28],[.9,.5],[.72,.72],[.38,.68],[.12,.5]]},
  // Nivel 3
  {nombre:'Árbol',      emoji:'🌲', nivel:3, pts:[[.5,.04],[.78,.32],[.62,.32],[.82,.56],[.64,.56],[.84,.8],[.6,.8],[.6,.96],[.4,.96],[.4,.8],[.16,.8],[.36,.56],[.18,.56],[.38,.32],[.22,.32],[.5,.04]]},
  {nombre:'Mariposa',   emoji:'🦋', nivel:3, pts:[[.5,.5],[.18,.18],[.08,.38],[.18,.6],[.4,.65],[.5,.5],[.6,.65],[.82,.6],[.92,.38],[.82,.18],[.5,.5]]},
  {nombre:'Cohete',     emoji:'🚀', nivel:3, pts:[[.5,.04],[.66,.26],[.72,.6],[.62,.78],[.5,.82],[.38,.78],[.28,.6],[.34,.26],[.5,.04],[.5,.82],[.36,.96],[.5,.82],[.64,.96],[.5,.82]]},
];

const NIVELES_CONFIG={
  1:{emoji:'🥚',nombre:'Huevo',        xpPor:12, radioTouch:44, puntosVer:1},
  2:{emoji:'🐣',nombre:'Pollito',       xpPor:16, radioTouch:36, puntosVer:3},
  3:{emoji:'🐤',nombre:'Pollito grande',xpPor:22, radioTouch:30, puntosVer:'todos'},
};

const INSTRUCCIONES={
  1:'¡Tocá el punto brillante! Te vas a sorprender con lo que aparece 🌟',
  2:'¡Tocá los 3 puntos en orden para armar la figura!',
  3:'¡Uní todos los puntos numerados para descubrir la figura!',
};

// =============================================
// AUDIO
// =============================================
let vocesGrabadas={};
let audioActual=null;
let _vocesListas=false;

async function cargarVoces(){
  try{const l=localStorage.getItem('voces_teabrazo');if(l)vocesGrabadas=JSON.parse(l);}catch(e){}
  try{
    const res=await fetch('audio/teabrazo_voces.json');
    if(res.ok){const d=await res.json();vocesGrabadas={...d,...vocesGrabadas};}
  }catch(e){}
  _vocesListas=true;
}

function reproducir(id){
  if(appEstaSilenciada()||!vocesGrabadas[id])return;
  if(audioActual){audioActual.pause();audioActual.currentTime=0;}
  const a=new Audio(vocesGrabadas[id]);audioActual=a;
  a.onerror=()=>{};a.play().catch(()=>{});
}
function _hablar(t,r){}

// =============================================
// ESTADO
// =============================================
let hijo=null, nivelActual=1, puntaje=0, juegoActivo=false;
let figuraActual=null, figurasUsadas=[];
let puntoActual=0; // índice del próximo punto a tocar
let animLoop=null;

// =============================================
// INICIO
// =============================================
window.addEventListener('load',()=>{
  const h=sessionStorage.getItem('hijoActual');
  if(!h){window.location.href='perfiles.html';return;}
  hijo=JSON.parse(h);
  puntaje=hijo.xp_total||0;
  nivelActual=hijo.nivel||1;
  document.getElementById('puntaje').textContent=puntaje;
  document.getElementById('nivelEmoji').textContent=NIVELES_CONFIG[nivelActual]?.emoji||'🥚';
  document.getElementById('nivelNombre').textContent=NIVELES_CONFIG[nivelActual]?.nombre||'Huevo';
  document.getElementById('introTexto').textContent=INSTRUCCIONES[nivelActual]||INSTRUCCIONES[1];

  // Cargar voces primero, luego mostrar intro
  cargarVoces().then(()=>{
    document.getElementById('introOverlay').style.display='flex';
  });
});

function cerrarIntro(){
  document.getElementById('introOverlay').style.display='none';
  if(audioActual){audioActual.pause();audioActual.currentTime=0;}
  mostrarCountdown();
}

// =============================================
// COUNTDOWN
// =============================================
function mostrarCountdown(){
  const overlay=document.getElementById('countdownOverlay');
  const numEl=document.getElementById('countdownNumero');
  overlay.style.display='flex';
  const pasos=[
    {texto:'3',color:'#FF7E6B',audio:'tres'},
    {texto:'2',color:'#FFCC3B',audio:'dos'},
    {texto:'1',color:'#A78BFA',audio:'uno'},
    {texto:'¡YA!',color:'#5BBFEA',audio:'ya',esYa:true},
  ];
  let i=0;
  function sig(){
    if(i>=pasos.length){overlay.style.display='none';iniciarJuego();return;}
    const p=pasos[i];
    numEl.className=p.esYa?'countdown-ya':'countdown-numero';
    numEl.style.color=p.color;numEl.textContent=p.texto;
    numEl.style.animation='none';numEl.offsetHeight;numEl.style.animation='';
    reproducir(p.audio);i++;setTimeout(sig,900);
  }
  sig();
}

// =============================================
// JUEGO
// =============================================
function iniciarJuego(){
  juegoActivo=true;
  figurasUsadas=[];
  nuevaFigura();
}

function elegirFigura(){
  const disponibles=FIGURAS.filter(f=>f.nivel===nivelActual&&!figurasUsadas.includes(f.nombre));
  if(disponibles.length===0)figurasUsadas=[];
  const arr=disponibles.length>0?disponibles:FIGURAS.filter(f=>f.nivel===nivelActual);
  if(arr.length===0)return FIGURAS[0];
  const f=arr[Math.floor(Math.random()*arr.length)];
  figurasUsadas.push(f.nombre);
  return f;
}

function nuevaFigura(){
  if(!juegoActivo)return;
  // Cancelar loop anterior
  if(animLoop)cancelAnimationFrame(animLoop);

  figuraActual=elegirFigura();
  puntoActual=0;

  document.getElementById('figuraNombre').textContent=figuraActual.emoji+' '+figuraActual.nombre;
  mostrarPupi('¡Tocá el primer punto brillante! ✨');
  _hablar('¡Uní los puntos para armar el '+figuraActual.nombre,1.0);

  // Dimensionar canvas AHORA que ya sabemos el layout
  dimensionarCanvas();

  // Iniciar loop de render y eventos
  iniciarLoop();
  configurarEventos();
}

function dimensionarCanvas(){
  const canvas=document.getElementById('puntosCanvas');
  const area=document.getElementById('areaJuego');
  const nombreEl=document.getElementById('figuraNombre');
  const pupiEl=document.querySelector('.pupi-panel');

  // Medir espacio real disponible para el canvas
  const areaH=area.clientHeight;
  const nombreH=nombreEl.offsetHeight||30;
  const pupiH=pupiEl?.offsetHeight||70;
  const gaps=8*3; // 3 gaps de 8px

  const disponibleH=areaH-nombreH-pupiH-gaps;
  const disponibleW=area.clientWidth-0;
  const tam=Math.max(180,Math.min(disponibleW,disponibleH));

  canvas.width=tam;
  canvas.height=tam;
  canvas.style.width=tam+'px';
  canvas.style.height=tam+'px';
}

// =============================================
// LOOP DE ANIMACIÓN
// =============================================
function iniciarLoop(){
  if(animLoop)cancelAnimationFrame(animLoop);
  function loop(){
    if(!juegoActivo||!figuraActual){animLoop=null;return;}
    renderFigura();
    animLoop=requestAnimationFrame(loop);
  }
  animLoop=requestAnimationFrame(loop);
}

// =============================================
// RENDER
// =============================================
function renderFigura(){
  const canvas=document.getElementById('puntosCanvas');
  if(!canvas||canvas.width===0||canvas.height===0)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
  const pts=figuraActual.pts.map(([x,y])=>({x:x*W,y:y*H}));

  ctx.clearRect(0,0,W,H);

  // --- Líneas ya trazadas ---
  if(puntoActual>0){
    ctx.strokeStyle='#A78BFA';
    ctx.lineWidth=Math.max(3,W*0.008);
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<=Math.min(puntoActual,pts.length-1);i++){
      ctx.lineTo(pts[i].x,pts[i].y);
    }
    ctx.stroke();
  }

  // --- Cuántos puntos mostrar según nivel ---
  const cantMostrar = nc.puntosVer==='todos' ? pts.length : nc.puntosVer+1;

  // --- Dibujar puntos ---
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const yaUnido=i<puntoActual;
    const esSiguiente=i===puntoActual;
    const esVisible=i<=puntoActual+(cantMostrar-1) && i<pts.length;

    if(yaUnido){
      // Punto ya tocado — verde pequeño
      ctx.beginPath();ctx.arc(p.x,p.y,W*0.022,0,Math.PI*2);
      ctx.fillStyle='#52D9A0';ctx.fill();
    } else if(esSiguiente){
      // Punto objetivo — grande, animado con pulso
      const t=Date.now()/500;
      const escala=1+Math.sin(t)*0.25;
      const r=W*0.042*escala;

      // Halo exterior
      const grad=ctx.createRadialGradient(p.x,p.y,r*0.3,p.x,p.y,r*2);
      grad.addColorStop(0,'rgba(255,204,59,0.6)');
      grad.addColorStop(1,'rgba(255,204,59,0)');
      ctx.beginPath();ctx.arc(p.x,p.y,r*2,0,Math.PI*2);
      ctx.fillStyle=grad;ctx.fill();

      // Círculo dorado
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle='#FFCC3B';ctx.fill();
      ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();

      // Número (solo si nivel 2 o 3)
      if(nc.puntosVer!==1){
        ctx.fillStyle='white';
        ctx.font=`bold ${Math.max(11,W*0.032)}px Nunito,sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(i+1,p.x,p.y);
      }

    } else if(esVisible){
      // Punto próximo visible
      ctx.beginPath();ctx.arc(p.x,p.y,W*0.028,0,Math.PI*2);
      ctx.fillStyle='#5BBFEA';ctx.fill();
      ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
      if(nc.puntosVer!==1){
        ctx.fillStyle='white';
        ctx.font=`bold ${Math.max(10,W*0.028)}px Nunito,sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(i+1,p.x,p.y);
      }
    }
  }

  // Guía punteada al siguiente punto
  if(puntoActual>0 && puntoActual<pts.length){
    ctx.strokeStyle='#DDD5FF';
    ctx.lineWidth=2;ctx.setLineDash([6,8]);
    ctx.beginPath();
    ctx.moveTo(pts[puntoActual-1].x,pts[puntoActual-1].y);
    ctx.lineTo(pts[puntoActual].x,pts[puntoActual].y);
    ctx.stroke();ctx.setLineDash([]);
  }
}

// =============================================
// EVENTOS DE TOQUE
// =============================================
function configurarEventos(){
  const canvas=document.getElementById('puntosCanvas');
  canvas.onpointerdown=e=>{e.preventDefault();procesarToque(e.clientX,e.clientY);};
  canvas.ontouchstart=e=>{e.preventDefault();if(e.touches[0])procesarToque(e.touches[0].clientX,e.touches[0].clientY);};
}

function procesarToque(clientX,clientY){
  if(!juegoActivo||!figuraActual)return;
  if(puntoActual>=figuraActual.pts.length)return;

  const canvas=document.getElementById('puntosCanvas');
  const rect=canvas.getBoundingClientRect();
  // Escalar correctamente por si el canvas tiene diferente tamaño visual
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const tx=(clientX-rect.left)*scaleX;
  const ty=(clientY-rect.top)*scaleY;

  const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
  const objetivo=figuraActual.pts[puntoActual];
  const ox=objetivo[0]*canvas.width;
  const oy=objetivo[1]*canvas.height;
  const dist=Math.sqrt((tx-ox)**2+(ty-oy)**2);

  if(dist<=nc.radioTouch){
    // ¡Acierto!
    puntoActual++;
    reproducir('bien');

    if(puntoActual>=figuraActual.pts.length){
      // Figura completa
      setTimeout(figuraCompleta,300);
    } else {
      const quedan=figuraActual.pts.length-puntoActual;
      mostrarPupi(quedan===1?'¡Último punto! 🌟':'¡Bien! '+quedan+' puntos más ✏️');
    }
  }
}

// =============================================
// FIGURA COMPLETA
// =============================================
function figuraCompleta(){
  if(animLoop)cancelAnimationFrame(animLoop);

  // Dibujar figura final con color y emoji
  const canvas=document.getElementById('puntosCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const pts=figuraActual.pts.map(([x,y])=>({x:x*W,y:y*H}));

  ctx.clearRect(0,0,W,H);

  // Línea final suave
  ctx.strokeStyle='#A78BFA';
  ctx.lineWidth=Math.max(3,W*0.009);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();

  // Emoji grande semitransparente en el centro
  ctx.globalAlpha=0.25;
  ctx.font=`${W*0.45}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(figuraActual.emoji,W/2,H/2);
  ctx.globalAlpha=1;

  puntaje+=(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor;
  document.getElementById('puntaje').textContent=puntaje;

  mostrarPupi('¡Armaste el '+figuraActual.nombre+'! '+figuraActual.emoji+' 🎉');
  reproducir('bien');
  lanzarMiniConfeti();
  setTimeout(mostrarCelebracion,1500);
}

function mostrarCelebracion(){
  const frases=[{texto:'¡EXCELENTE!',audio:'excelente'},{texto:'¡QUÉ BIEN!',audio:'que_bien'},{texto:'¡INCREÍBLE!',audio:'increible'}];
  const f=frases[Math.floor(Math.random()*frases.length)];
  document.getElementById('celEmoji').textContent=figuraActual.emoji;
  document.getElementById('celTitulo').textContent=f.texto;
  document.getElementById('celXP').textContent='+'+(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor+' XP ⚡';
  document.getElementById('celebracion').style.display='flex';
  lanzarConfeti();reproducir(f.audio);
  guardarProgreso();
}

function cerrarCelebracion(){
  document.getElementById('celebracion').style.display='none';
  nuevaFigura();
}

function mostrarPupi(t){document.getElementById('pupiTexto').textContent=t;}

// =============================================
// CONFETI
// =============================================
function lanzarMiniConfeti(){
  const c=document.getElementById('confeti');c.style.display='block';c.innerHTML='';
  const cols=['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confeti-pieza';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*0.5+'s';p.style.width=(Math.random()*8+4)+'px';p.style.height=(Math.random()*8+4)+'px';c.appendChild(p);}
  setTimeout(()=>{c.style.display='none';c.innerHTML='';},1800);
}
function lanzarConfeti(){
  const c=document.getElementById('confeti');c.style.display='block';c.innerHTML='';
  const cols=['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
  for(let i=0;i<80;i++){const p=document.createElement('div');p.className='confeti-pieza';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1+'s';p.style.width=(Math.random()*10+6)+'px';p.style.height=(Math.random()*10+6)+'px';c.appendChild(p);}
  setTimeout(()=>{c.style.display='none';c.innerHTML='';},2500);
}

async function guardarProgreso(){
  try{
    await sb.from('children').update({xp_total:puntaje}).eq('id',hijo.id);
    hijo.xp_total=puntaje;sessionStorage.setItem('hijoActual',JSON.stringify(hijo));
  }catch(e){}
}

function salir(){
  juegoActivo=false;
  if(animLoop)cancelAnimationFrame(animLoop);
  if(audioActual){audioActual.pause();audioActual.currentTime=0;}
  window.location.href='bienvenida.html';
}
</script>
