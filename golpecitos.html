<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEAbrazo — Golpecitos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#1a0a3a;font-family:'Nunito',sans-serif;width:100vw;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

  .header-juego{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#ffffff12;backdrop-filter:blur(12px);flex-shrink:0;}
  .btn-salir{background:#ffffff18;border:2px solid #ffffff28;border-radius:14px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:white;cursor:pointer;}
  .header-centro{display:flex;align-items:center;gap:10px;}
  .nivel-badge{display:flex;align-items:center;gap:6px;background:#ffffff18;border:2px solid #ffffff28;border-radius:50px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:white;}
  .nivel-emoji-b{font-size:18px;animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .puntaje-wrap{display:flex;align-items:center;gap:6px;background:#FFCC3B22;border:2px solid #FFCC3B44;border-radius:50px;padding:6px 14px;}
  .puntaje-texto{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#FFCC3B;}

  .area-juego{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px;position:relative;touch-action:none;cursor:pointer;user-select:none;}

  /* Fase MOSTRAR destellos */
  .fase-mostrar{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;flex:1;width:100%;}
  .destello-central{
    width:clamp(140px,40vw,200px);height:clamp(140px,40vw,200px);
    border-radius:50%;
    background:radial-gradient(circle,#FFCC3B,#FFAA00,transparent);
    box-shadow:0 0 60px 30px #FFCC3B66,0 0 120px 60px #FFCC3B22;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(60px,18vw,90px);
    opacity:0;
    transform:scale(0.3);
    transition:none;
  }
  .destello-central.visible{
    animation:destello-aparecer 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes destello-aparecer{
    0%{opacity:0;transform:scale(0.3);}
    60%{opacity:1;transform:scale(1.15);}
    100%{opacity:1;transform:scale(1);}
  }
  .destello-central.oculto{
    animation:destello-desaparecer 0.2s ease forwards;
  }
  @keyframes destello-desaparecer{to{opacity:0;transform:scale(0.2);}}

  .contador-destellos{
    display:flex;gap:10px;justify-content:center;
    min-height:24px;
  }
  .punto-destello{
    width:16px;height:16px;border-radius:50%;
    background:#FFCC3B;
    box-shadow:0 0 10px #FFCC3B;
    animation:punto-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes punto-pop{from{transform:scale(0)}to{transform:scale(1)}}

  .instruccion-fase{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:clamp(18px,5vw,24px);color:white;text-align:center;
    text-shadow:0 2px 12px #00000055;
  }

  /* Fase TOCAR */
  .fase-tocar{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;flex:1;width:100%;}
  .tocar-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(22px,6vw,30px);color:white;text-align:center;}
  .tocar-num-destellos{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(80px,22vw,120px);color:#FFCC3B;text-shadow:0 0 30px #FFCC3B88;line-height:1;animation:num-pulsar 1.5s ease-in-out infinite;}
  @keyframes num-pulsar{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .tocar-golpes{font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(16px,4.5vw,20px);color:#A78BFA;text-align:center;}
  .btn-tocar{
    width:clamp(160px,45vw,220px);height:clamp(160px,45vw,220px);
    border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle,#A78BFA,#5BBFEA);
    box-shadow:0 0 40px #A78BFA55,0 8px 32px #00000044;
    font-size:clamp(60px,18vw,90px);
    display:flex;align-items:center;justify-content:center;
    transition:transform 0.1s;
    animation:btn-pulsar 2s ease-in-out infinite;
  }
  @keyframes btn-pulsar{0%,100%{box-shadow:0 0 40px #A78BFA55}50%{box-shadow:0 0 60px #A78BFA88}}
  .btn-tocar:active{transform:scale(0.88)!important;}
  .btn-tocar.golpeado{animation:golpe-anim 0.2s ease forwards;}
  @keyframes golpe-anim{0%{transform:scale(1)}50%{transform:scale(0.85)}100%{transform:scale(1)}}

  .golpes-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:28px;}
  .golpe-punto{width:20px;height:20px;border-radius:50%;background:#52D9A0;box-shadow:0 0 10px #52D9A0;animation:punto-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  .golpe-punto.extra{background:#FF7E6B;box-shadow:0 0 10px #FF7E6B;}

  /* Feedback */
  .feedback-wrap{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.3s;}
  .feedback-wrap.visible{opacity:1;}
  .feedback-txt{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(60px,18vw,100px);color:white;text-shadow:0 4px 24px #00000055;animation:feedback-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes feedback-pop{from{transform:scale(0.3)}to{transform:scale(1)}}

  .pupi-corner{position:absolute;bottom:14px;left:14px;z-index:50;display:flex;align-items:flex-end;gap:8px;pointer-events:none;}
  .pupi-em{font-size:clamp(36px,10vw,46px);animation:pupi-b 2s ease-in-out infinite;filter:drop-shadow(0 3px 8px #00000088);}
  @keyframes pupi-b{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
  .pupi-msg{background:white;border-radius:16px 16px 16px 4px;padding:8px 12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(12px,3.5vw,15px);color:#333;max-width:180px;box-shadow:0 3px 16px #00000055;line-height:1.3;}

  @keyframes intro-bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
  @keyframes pupi-intro{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  @keyframes btn-llamar{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

  .countdown-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#1a0a3aee;}
  .countdown-numero{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(120px,35vw,200px);animation:num-pop .6s cubic-bezier(0.34,1.56,0.64,1);line-height:1;}
  .countdown-ya{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(60px,18vw,100px);color:#FFCC3B;animation:num-pop .5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes num-pop{from{transform:scale(0.2) rotate(-10deg);opacity:0}to{transform:scale(1);opacity:1}}

  .cel-overlay{position:fixed;inset:0;background:#00000077;z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
  .cel-card{background:white;border-radius:32px;padding:36px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:340px;animation:pop-in .4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop-in{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
  .cel-emoji{font-size:64px;}.cel-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(24px,7vw,30px);color:#333;text-align:center;}
  .cel-xp{background:linear-gradient(135deg,#FFCC3B,#FF7E6B);border-radius:50px;padding:10px 24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:white;}
  .btn-cel{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:20px;padding:16px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:white;cursor:pointer;}
  .btn-cel:active{transform:scale(0.97);}
  .btn-cel-sec{background:#F0F7FF;border:none;border-radius:16px;padding:12px;width:100%;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:#888;cursor:pointer;}

  .fin-overlay{position:fixed;inset:0;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:linear-gradient(135deg,#5BBFEA,#A78BFA);}
  .fin-titulo{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(48px,15vw,80px);color:white;text-align:center;}
  .fin-sub{font-family:'Nunito',sans-serif;font-weight:700;font-size:18px;color:rgba(255,255,255,0.85);text-align:center;}
  .fin-pupi{font-size:80px;}
  .fin-pin-wrap{background:white;border-radius:24px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:320px;}
  .fin-pin-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:#555;text-align:center;}
  .fin-pin-input{display:flex;gap:10px;justify-content:center;}
  .fin-pin-digito{width:56px;height:64px;border:3px solid #E0EFFF;border-radius:16px;background:#F0F7FF;text-align:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:#333;outline:none;}
  .fin-pin-digito:focus{border-color:#5BBFEA;}
  .fin-pin-error{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#FF7E6B;display:none;}
  .btn-fin-desbloquear{background:linear-gradient(135deg,#5BBFEA,#A78BFA);border:none;border-radius:18px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:white;cursor:pointer;}

  .confeti{position:fixed;inset:0;pointer-events:none;z-index:700;display:none;}
  .confeti-pieza{position:absolute;border-radius:2px;animation:caer 1.8s ease-in forwards;}
  @keyframes caer{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

  .footer{position:relative;z-index:100;background:#ffffff11;border-top:1px solid #ffffff18;padding:5px 20px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .footer-marca{font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;color:#5BBFEA;}
  .footer-marca a{color:#5BBFEA;text-decoration:none;}
  .footer-legal{font-family:'Nunito Sans',sans-serif;font-size:9px;color:#555;text-align:center;}
</style>
</head>
<body>
<div class="confeti" id="confeti"></div>

<div id="introOverlay" style="position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;background:linear-gradient(135deg,#1a0a3a,#2a1a5e);">
  <div style="font-size:clamp(72px,20vw,110px);animation:intro-bounce 1s ease-in-out infinite;">✨</div>
  <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(22px,6vw,32px);color:white;text-align:center;">¡Golpecitos!</div>
  <div style="display:flex;align-items:flex-end;gap:12px;max-width:360px;width:100%;">
    <div style="font-size:clamp(44px,12vw,64px);animation:pupi-intro 2s ease-in-out infinite;flex-shrink:0;">🐙</div>
    <div id="introTexto" style="background:white;border-radius:20px 20px 20px 4px;padding:14px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(15px,4.5vw,19px);color:#333;line-height:1.4;flex:1;"></div>
  </div>
  <button onclick="cerrarIntro()" style="background:linear-gradient(135deg,#52D9A0,#5BBFEA);border:none;border-radius:28px;padding:20px 0;width:100%;max-width:320px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(20px,6vw,26px);color:white;cursor:pointer;animation:btn-llamar 2s ease-in-out infinite;">¡Listo! 🚀</button>
</div>

<div class="countdown-overlay" id="countdownOverlay">
  <div style="font-size:clamp(60px,18vw,90px);">🐙</div>
  <div id="countdownNumero" class="countdown-numero" style="color:#FFCC3B;">3</div>
</div>

<div class="cel-overlay" id="celebracion">
  <div class="cel-card">
    <div class="cel-emoji">✨</div>
    <div class="cel-titulo" id="celTitulo">¡EXCELENTE!</div>
    <div class="cel-xp" id="celXP">+12 XP ⚡</div>
    <button class="btn-cel" onclick="cerrarCelebracion()">¡Seguir! 🚀</button>
    <button class="btn-cel-sec" onclick="salir()">Volver al inicio</button>
  </div>
</div>

<div class="fin-overlay" id="finOverlay">
  <div class="fin-pupi">🐙</div><div class="fin-titulo">¡GRACIAS!</div><div class="fin-sub">¡Jugaste genial! 🌟</div>
  <div class="fin-pin-wrap">
    <div class="fin-pin-label">🔐 PIN para salir</div>
    <div class="fin-pin-input">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p1" oninput="avanzarPin(this,'p2')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p2" oninput="avanzarPin(this,'p3')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p3" oninput="avanzarPin(this,'p4')">
      <input class="fin-pin-digito" type="password" maxlength="1" inputmode="numeric" id="p4" oninput="verificarPin()">
    </div>
    <div class="fin-pin-error" id="pinError">❌ PIN incorrecto.</div>
    <button class="btn-fin-desbloquear" onclick="verificarPin()">Desbloquear 🔓</button>
  </div>
</div>

<div class="feedback-wrap" id="feedbackWrap">
  <div class="feedback-txt" id="feedbackTxt">✅</div>
</div>

<div class="header-juego">
  <button class="btn-salir" onclick="salir()">← Salir</button>
  <div class="header-centro">
    <div class="nivel-badge"><span class="nivel-emoji-b" id="nivelEmoji">🥚</span><span id="nivelNombre">Huevo</span></div>
  </div>
  <div class="puntaje-wrap">⭐ <span class="puntaje-texto" id="puntaje">0</span></div>
</div>

<div class="area-juego" id="areaJuego">
  <!-- Se renderiza dinámicamente -->
  <div class="pupi-corner">
    <span class="pupi-em">🐙</span>
    <div class="pupi-msg" id="pupiMsg">¡Mirá los destellos! ✨</div>
  </div>
</div>

<div class="footer">
  <div class="footer-marca">Un producto de <a href="https://www.cusol.com.ar" target="_blank">cusol.com.ar</a></div>
  <div class="footer-legal">© 2025 Cusol. Todos los derechos reservados.</div>
</div>

<script>
  const SUPABASE_URL='https://oyuriwnxioylyetchbbz.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJpd254aW95bHlldGNoYmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzA1ODYsImV4cCI6MjA5Njg0NjU4Nn0.omJAxTGFX5tdPr3Ny0fpxjxCuG9ieYPVA8AMSzPsVIA';
  const {createClient}=supabase;const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
  function appEstaSilenciada(){return localStorage.getItem('teabrazo_muted')==='1';}

  const NIVELES_CONFIG={
    1:{emoji:'🥚',nombre:'Huevo',        xpPor:10, rango:[1,3], juegosXRonda:4},
    2:{emoji:'🐣',nombre:'Pollito',       xpPor:14, rango:[2,5], juegosXRonda:4},
    3:{emoji:'🐤',nombre:'Pollito grande',xpPor:18, rango:[3,8], juegosXRonda:4},
  };
  const EMOJIS_DESTELLO=['⭐','✨','💫','🌟','⚡','🎇','🎆'];


  // =============================================
  // SISTEMA DE AUDIO
  // 1. Carga audio/teabrazo_voces.json al inicio
  // 2. Merge con localStorage (localStorage tiene prioridad)
  // 3. Si no hay voz → silencio (sin TTS ni MP3)
  // =============================================
    // AUDIO — carga desde audio/teabrazo_voces.json o localStorage. Sin voz = silencio.
  let vocesGrabadas = {};
  let audioActual = null;
  let _vocesListas = false;

  async function cargarVoces() {
    try { const l=localStorage.getItem('voces_teabrazo'); if(l) vocesGrabadas=JSON.parse(l); } catch(e) {}
    try {
      const res=await fetch('audio/teabrazo_voces.json');
      if(res.ok){ const d=await res.json(); vocesGrabadas={...d,...vocesGrabadas}; }
    } catch(e) {}
    _vocesListas=true;
  }

  function reproducir(id) {
    if(appEstaSilenciada()||!vocesGrabadas[id]) return;
    if(audioActual){audioActual.pause();audioActual.currentTime=0;}
    const a=new Audio(vocesGrabadas[id]); audioActual=a;
    a.onerror=()=>{}; a.play().catch(()=>{});
  }

  function _hablar(t,r){}



  // =============================================
  // FASE 1: MOSTRAR DESTELLOS
  // =============================================
  function mostrarFaseMostrar(){
    faseActual='mostrar';
    const area=document.getElementById('areaJuego');
    const pupi=area.querySelector('.pupi-corner');
    area.innerHTML='';

    const fase=document.createElement('div');fase.className='fase-mostrar';
    const instrEl=document.createElement('div');instrEl.className='instruccion-fase';instrEl.textContent='¡Mirá y contá! 👀';
    const destEl=document.createElement('div');destEl.className='destello-central';destEl.id='destelloEl';destEl.textContent=emojiActual;
    const contEl=document.createElement('div');contEl.className='contador-destellos';contEl.id='contadorEl';
    fase.appendChild(instrEl);fase.appendChild(destEl);fase.appendChild(contEl);
    area.appendChild(fase);area.appendChild(pupi);

    mostrarPupi('¡Mirá cuántos destellos! 👀');
    _hablar('¡Mirá! Contá los destellos',1.0);

    // Mostrar destellos uno a uno
    let i=0;
    const intervalo=700;
    function siguienteDestello(){
      if(i>=cantidadDestellos){
        setTimeout(mostrarFaseTocar,800);return;
      }
      // Aparecer
      destEl.className='destello-central visible';
      i++;
      // Agregar punto al contador
      const pt=document.createElement('div');pt.className='punto-destello';contEl.appendChild(pt);
      // Desaparecer
      setTimeout(()=>{destEl.className='destello-central oculto';setTimeout(siguienteDestello,300);},350);
    }
    setTimeout(siguienteDestello,600);
  }

  // =============================================
  // FASE 2: TOCAR
  // =============================================
  function mostrarFaseTocar(){
    faseActual='tocar';golpesActuales=0;
    const area=document.getElementById('areaJuego');
    const pupi=area.querySelector('.pupi-corner');
    area.innerHTML='';

    const fase=document.createElement('div');fase.className='fase-tocar';
    const titulo=document.createElement('div');titulo.className='tocar-titulo';titulo.textContent='¡Ahora golpeá igual!';
    const numEl=document.createElement('div');numEl.className='tocar-num-destellos';numEl.id='numDestellos';numEl.textContent=cantidadDestellos;
    const golpesLbl=document.createElement('div');golpesLbl.className='tocar-golpes';golpesLbl.id='golpesLbl';golpesLbl.textContent='0 / '+cantidadDestellos+' golpes';
    const btn=document.createElement('button');btn.className='btn-tocar';btn.id='btnTocar';btn.textContent=emojiActual;
    btn.addEventListener('pointerdown',e=>{e.preventDefault();registrarGolpe();});
    const golpesRow=document.createElement('div');golpesRow.className='golpes-row';golpesRow.id='golpesRow';

    fase.appendChild(titulo);fase.appendChild(numEl);fase.appendChild(btn);fase.appendChild(golpesLbl);fase.appendChild(golpesRow);
    area.appendChild(fase);area.appendChild(pupi);

    mostrarPupi('¡Golpeá '+cantidadDestellos+' veces! 👆');
    _hablar('¡Ahora golpeá '+cantidadDestellos+' veces!',1.0);
  }

  function registrarGolpe(){
    if(faseActual!=='tocar'||!juegoActivo)return;
    golpesActuales++;
    const btn=document.getElementById('btnTocar');
    if(btn){btn.classList.remove('golpeado');btn.offsetHeight;btn.classList.add('golpeado');}
    document.getElementById('golpesLbl').textContent=golpesActuales+' / '+cantidadDestellos+' golpes';

    const row=document.getElementById('golpesRow');
    if(row){
      const pt=document.createElement('div');
      pt.className='golpe-punto'+(golpesActuales>cantidadDestellos?' extra':'');
      row.appendChild(pt);
    }

    if(golpesActuales===cantidadDestellos){
      // ¡Acierto!
      setTimeout(()=>evaluarRespuesta(true),200);
    }else if(golpesActuales>cantidadDestellos){
      // Se pasó
      setTimeout(()=>evaluarRespuesta(false),200);
    }
  }

  function evaluarRespuesta(correcto){
    faseActual='';
    juegosEnRonda++;
    if(correcto){
      juegosCorrectos++;
      puntaje+=(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor;
      document.getElementById('puntaje').textContent=puntaje;
      mostrarFeedback('¡'+cantidadDestellos+'! ✅',true);
      reproducir('bien');mostrarPupi('¡Correcto! '+cantidadDestellos+' golpes 🌟');
    }else{
      mostrarFeedback('¡Upps! ❌',false);
      reproducir('upps');mostrarPupi('¡Casi! Eran '+cantidadDestellos+' golpes 🤔');
    }
    const nc=NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1];
    if(juegosEnRonda>=nc.juegosXRonda){setTimeout(mostrarCelebracion,1200);}
    else{setTimeout(nuevaRonda,1500);}
  }

  function mostrarFeedback(txt,ok){
    const wrap=document.getElementById('feedbackWrap');
    const el=document.getElementById('feedbackTxt');
    el.textContent=txt;
    el.style.color=ok?'#52D9A0':'#FF7E6B';
    wrap.classList.add('visible');
    setTimeout(()=>wrap.classList.remove('visible'),1000);
  }

  function mostrarPupi(t){document.getElementById('pupiMsg').textContent=t;}

  function mostrarCelebracion(){
    const frases=[{texto:'¡EXCELENTE!',audio:'excelente'},{texto:'¡QUÉ BIEN!',audio:'que_bien'},{texto:'¡INCREÍBLE!',audio:'increible'}];
    const f=frases[Math.floor(Math.random()*frases.length)];
    const xp=juegosCorrectos*(NIVELES_CONFIG[nivelActual]||NIVELES_CONFIG[1]).xpPor;
    document.getElementById('celTitulo').textContent=f.texto;
    document.getElementById('celXP').textContent='+'+xp+' XP ⚡';
    document.getElementById('celebracion').style.display='flex';
    lanzarConfeti();reproducir(f.audio);guardarProgreso(rondasCorrectas||partesCorrectas||juegosCorrectos||0, rondasJugadas||partesJugadas||juegosEnRonda||RONDAS_POR_CELEBRACION||5);
  }
  function cerrarCelebracion(){document.getElementById('celebracion').style.display='none';juegosEnRonda=0;juegosCorrectos=0;nuevaRonda();}

  function lanzarConfeti(){
    const c=document.getElementById('confeti');c.style.display='block';c.innerHTML='';
    const cols=['#5BBFEA','#FFCC3B','#52D9A0','#FF7E6B','#A78BFA'];
    for(let i=0;i<80;i++){const p=document.createElement('div');p.className='confeti-pieza';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1+'s';p.style.width=(Math.random()*10+6)+'px';p.style.height=(Math.random()*10+6)+'px';c.appendChild(p);}
    setTimeout(()=>{c.style.display='none';c.innerHTML='';},2500);
  }
  function avanzarPin(el,sigId){if(el.value.length===1){const s=document.getElementById(sigId);if(s)s.focus();}}
  function verificarPin(){
    const ing=['p1','p2','p3','p4'].map(id=>document.getElementById(id).value).join('');
    const pin=hijo.pin?hijo.pin.toString():'';
    if(!pin||ing===pin)window.location.href='perfiles.html';
    else{document.getElementById('pinError').style.display='block';['p1','p2','p3','p4'].forEach(id=>document.getElementById(id).value='');document.getElementById('p1').focus();}
  }
  async function guardarProgreso(aciertos=0,total=0){
    await registrarResultadoPartida(aciertos,total);
    try{await sb.from('children').update({xp_total:puntaje}).eq('id',hijo.id);hijo.xp_total=puntaje;sessionStorage.setItem('hijoActual',JSON.stringify(hijo));}catch(e){}
  }
  function salir(){juegoActivo=false;if(audioActual){audioActual.pause();audioActual.currentTime=0;}window.location.href='bienvenida.html';}
</script>
</body>
</html>
